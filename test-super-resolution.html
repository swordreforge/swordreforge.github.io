<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超分辨率测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        h1 { margin-bottom: 20px; }
        .controls {
            margin: 20px 0;
        }
        input[type="file"] {
            margin-right: 20px;
        }
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover { background: #5a6fd6; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status {
            margin: 20px 0;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 6px;
        }
        canvas {
            max-width: 100%;
            border: 1px solid #444;
            margin: 10px 0;
        }
        .info {
            color: #888;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>2x 超分辨率测试</h1>
    
    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <button id="process" disabled>2x 超分</button>
    </div>
    
    <div class="status" id="status">等待上传图片...</div>
    
    <div class="info" id="info"></div>
    <canvas id="output" style="display: none;"></canvas>

    <script type="module">
        import SuperResolution from './ai-super-resolution.js';
        
        const upload = document.getElementById('upload');
        const processBtn = document.getElementById('process');
        const status = document.getElementById('status');
        const info = document.getElementById('info');
        const output = document.getElementById('output');
        
        const sr = new SuperResolution();
        let inputImage = null;
        
        upload.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) {
                status.textContent = '请选择图片';
                return;
            }
            
            status.textContent = '加载图片...';
            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = () => {
                inputImage = img;
                info.textContent = `输入: ${img.width}x${img.height}`;
                output.style.display = 'none';
                processBtn.disabled = false;
                status.textContent = '图片已加载，点击按钮开始处理';
            };
        });
        
        processBtn.addEventListener('click', async () => {
            if (!inputImage) return;
            
            processBtn.disabled = true;
            status.textContent = '处理中...';
            
            const canvas = document.createElement('canvas');
            canvas.width = inputImage.width;
            canvas.height = inputImage.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(inputImage, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            const startTime = performance.now();
            
            try {
                const resultData = await sr.process(imageData);
                const elapsed = (performance.now() - startTime) / 1000;
                
                output.width = inputImage.width * 2;
                output.height = inputImage.height * 2;
                const outCtx = output.getContext('2d');
                outCtx.putImageData(resultData, 0, 0);
                
                output.style.display = 'block';
                info.textContent = `输入: ${inputImage.width}x${inputImage.height} → 输出: ${output.width}x${output.height}`;
                status.textContent = `处理完成! 耗时: ${elapsed.toFixed(2)}秒`;
            } catch (err) {
                status.textContent = '错误: ' + err.message;
                console.error(err);
            }
            
            processBtn.disabled = false;
        });
    </script>
</body>
</html>
