<!DOCTYPE html>
<html lang="en">

{% include head.html %}

<!-- hack iOS CSS :active style -->
<body ontouchstart="">
    <script>
(function() {
  // 随机文字配置
  const messages = [
    "Access Granted", "404 Error", "System Breached",
    "Encryption Active", "Root Access", "Overwrite Initiated",
    "Firewall Active", "Sword Art Online", "Mainframe Connected"
  ];

  // 数字雨配置
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()";
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');
  
  let drops = [];
  let animationFrame;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createText(x, y) {
    const text = document.createElement('div');
    text.className = 'hacker-text';
    text.style.left = `${x}px`;
    text.style.top = `${y}px`;
    text.textContent = messages[Math.floor(Math.random() * messages.length)];
    document.body.appendChild(text);
    
    setTimeout(() => text.remove(), 2000);
  }

  function drawMatrix() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = '#0f0';
    ctx.font = '14px monospace';

    drops.forEach((drop, i) => {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * 20, drop.pos);
      
      if (drop.pos > canvas.height || Math.random() > 0.975) {
        drop.pos = 0;
      }
      drop.pos += drop.speed;
    });
  }

  function initMatrix() {
    resizeCanvas();
    drops = Array(Math.floor(canvas.width / 20)).fill(0).map(() => ({
      pos: Math.random() * -canvas.height,
      speed: 5 + Math.random() * 5
    }));
    
    if (animationFrame) cancelAnimationFrame(animationFrame);
    (function animate() {
      drawMatrix();
      animationFrame = requestAnimationFrame(animate);
    })();
  }

  // 事件监听
  window.addEventListener('resize', initMatrix);
  document.addEventListener('click', (e) => {
    createText(e.clientX, e.clientY);
  });

  // 初始化数字雨
  initMatrix();
})();
</script>

<canvas id="matrixCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:-1;"></canvas>

<style>
.hacker-text {
  position: absolute;
  color: #0f0;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  text-shadow: 0 0 5px #0f0;
  pointer-events: none;
  animation: floatUp 2s ease-out forwards;
}

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0);
  }
  100% {
    opacity: 0;
    transform: translateY(-100px);
  }
}
</style>
