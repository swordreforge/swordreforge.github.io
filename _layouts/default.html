<!DOCTYPE html>
<html lang="en" data-theme="dark">
{% include head.html %}

<body ontouchstart="">
  
  <!-- 在导航栏中添加主题切换按钮 -->
  <div class="theme-switcher">
    <button onclick="switchTheme('dark')">暗黑主题</button>
    <button onclick="switchTheme('light')">护眼主题</button>
  </div>

  {% include nav.html %}
  {{ content }}
  {% include footer.html %}

  <canvas id="matrixCanvas"></canvas>

  <style>
    :root {
      /* 暗黑主题默认变量 */
      --bg-color: #1a1a1a;
      --text-color: #0f0;
      --accent-color: #00ff00;
      --matrix-color: #0f0;
    }

    [data-theme="light"] {
      /* 米黄护眼主题变量 */
      --bg-color: #f0e7d8;
      --text-color: #4a4a4a;
      --accent-color: #8b4513;
      --matrix-color: #654321;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.3s ease;
    }

    .theme-switcher {
      position: fixed;
      top: 10px;
      right: 20px;
      z-index: 1000;
    }

    .theme-switcher button {
      background: var(--accent-color);
      color: var(--bg-color);
      border: none;
      padding: 5px 10px;
      margin: 0 5px;
      cursor: pointer;
      border-radius: 3px;
    }

    .hacker-text {
      color: var(--accent-color);
      text-shadow: 0 0 5px var(--accent-color);
    }

    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: -1;
    }
  </style>

  <script>
    // 主题切换功能
    function switchTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      updateMatrixColor(theme);
    }

    // 初始化主题
    function initializeTheme() {
      const savedTheme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      switchTheme(savedTheme);
    }

    // 更新矩阵颜色
    function updateMatrixColor(theme) {
      const matrixColor = theme === 'dark' ? '#0f0' : '#654321';
      if (window.matrixAnimation) {
        window.matrixAnimation.setColor(matrixColor);
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', initializeTheme);
  </script>

  <!-- 原矩阵代码需要修改颜色设置部分，示例： -->
  <script>
    class MatrixAnimation {
      constructor(canvas, color = '#0f0') {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.color = color;
        // ...其他初始化代码...
      }

      setColor(newColor) {
        this.color = newColor;
        // 重置动画或更新颜色
      }
    }
    // 初始化矩阵动画
    window.matrixAnimation = new MatrixAnimation(
      document.getElementById('matrixCanvas'),
      getComputedStyle(document.documentElement)
        .getPropertyValue('--matrix-color').trim()
    );
  </script>
</body>
</html>
