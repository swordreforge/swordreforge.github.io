<canvas id="matrixCanvas" style="position:fixed;top:0;left:0;pointer-events:none;z-index:-1;"></canvas>

<style>
.hacker-text {
  position: absolute;
  color: #0f0;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  text-shadow: 0 0 5px #0f0;
  pointer-events: none;
  animation: floatUp 2s ease-out forwards;
}

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0);
  }
  100% {
    opacity: 0;
    transform: translateY(-100px);
  }
}
</style>
