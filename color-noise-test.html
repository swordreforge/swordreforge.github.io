<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩色噪点测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            border-bottom: 2px solid #555;
            padding-bottom: 10px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .test-card {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #444;
        }
        .test-card h3 {
            margin-top: 0;
            color: #4a9eff;
        }
        .test-card canvas {
            max-width: 100%;
            border: 1px solid #555;
            margin: 10px 0;
        }
        .test-card p {
            font-size: 0.9em;
            color: #aaa;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            color: #ff6b6b;
            padding: 20px;
            background: #3a1a1a;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 彩色噪点功能测试</h1>
        <div id="loading" class="loading">正在加载 WASM 模块...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="testGrid" class="test-grid" style="display: none;">
            <!-- 测试卡片将通过 JavaScript 动态生成 -->
        </div>
    </div>

    <script type="module">
        import init, { ImageProcessor } from './pkg/photon_wasm.js';

        // 测试配置
        const tests = [
            { name: '原图', params: null, desc: '原始图像' },
            { name: '粉色噪点', params: null, type: 'pink', desc: 'RGB系数: (0.6, 0.1, 0.4)' },
            { name: '蓝色噪点', params: [0.1, 0.1, 0.6], type: 'color', desc: 'RGB系数: (0.1, 0.1, 0.6)' },
            { name: '绿色噪点', params: [0.1, 0.6, 0.1], type: 'color', desc: 'RGB系数: (0.1, 0.6, 0.1)' },
            { name: '红色噪点', params: [0.6, 0.1, 0.1], type: 'color', desc: 'RGB系数: (0.6, 0.1, 0.1)' },
            { name: '黄色噪点', params: [0.6, 0.6, 0.1], type: 'color', desc: 'RGB系数: (0.6, 0.6, 0.1)' },
            { name: '紫色噪点', params: [0.6, 0.1, 0.6], type: 'color', desc: 'RGB系数: (0.6, 0.1, 0.6)' },
            { name: '青色噪点', params: [0.1, 0.6, 0.6], type: 'color', desc: 'RGB系数: (0.1, 0.6, 0.6)' },
            { name: '随机噪点', params: [0.6, 0.6, 0.6], type: 'color', desc: 'RGB系数: (0.6, 0.6, 0.6)' },
        ];

        // 创建测试图像
        function createTestImage() {
            const canvas = document.createElement('canvas');
            canvas.width = 300;
            canvas.height = 200;
            const ctx = canvas.getContext('2d');

            // 创建渐变背景
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ff6b6b');
            gradient.addColorStop(0.5, '#4ecdc4');
            gradient.addColorStop(1, '#45b7d1');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 添加一些图形
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.beginPath();
            ctx.arc(100, 100, 50, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 0, 0.8)';
            ctx.fillRect(180, 60, 80, 80);

            // 添加文字
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Test', canvas.width / 2, 30);

            return canvas;
        }

        // 运行单个测试
        async function runTest(test, base64) {
            const canvas = createTestImage();
            const testDataUrl = canvas.toDataURL('image/png');
            const base64Data = testDataUrl.split(',')[1];
            const uint8Array = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));

            let processor = ImageProcessor.new_from_bytes(uint8Array);

            // 应用噪点
            if (test.type === 'pink') {
                processor.apply_pink_noise();
            } else if (test.type === 'color' && test.params) {
                processor.apply_color_noise(test.params[0], test.params[1], test.params[2]);
            }

            // 获取结果
            const resultBase64 = processor.to_base64();
            const resultDataUrl = resultBase64.includes('data:') ? resultBase64 : `data:image/png;base64,${resultBase64}`;

            return resultDataUrl;
        }

        // 渲染测试结果
        function renderResults(results) {
            const grid = document.getElementById('testGrid');
            grid.innerHTML = '';

            results.forEach((result, index) => {
                const card = document.createElement('div');
                card.className = 'test-card';
                card.innerHTML = `
                    <h3>${tests[index].name}</h3>
                    <p>${tests[index].desc}</p>
                    <canvas id="canvas-${index}" width="300" height="200"></canvas>
                `;
                grid.appendChild(card);

                // 加载图像到 canvas
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById(`canvas-${index}`);
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                };
                img.src = result;
            });

            grid.style.display = 'grid';
        }

        // 主函数
        async function main() {
            try {
                await init();
                console.log('WASM 模块加载成功');

                document.getElementById('loading').style.display = 'none';

                // 运行所有测试
                const results = [];
                for (const test of tests) {
                    const result = await runTest(test);
                    results.push(result);
                }

                renderResults(results);
            } catch (error) {
                console.error('错误:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `错误: ${error.message}`;
            }
        }

        main();
    </script>
</body>
</html>
