<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAssembly 图像处理器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #2c2c2c;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .main-content {
            display: flex;
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #444;
            color: white;
            border: none;
            padding: 15px 8px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 0 5px 5px 0;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: #555;
        }

        .sidebar {
            width: 320px;
            background: #333;
            padding: 20px;
            border-right: 1px solid #444;
            overflow-y: auto;
            overflow-x: hidden;
            transition: margin-left 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: #555 #333;
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #333;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .sidebar.hidden {
            margin-left: -320px;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            overflow: hidden;
            padding: 0;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h3 {
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 1.1em;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
        }

        .upload-area {
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-area.dragover {
            background: rgba(255, 255, 255, 0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            color: #888;
        }

        .upload-text {
            color: #aaa;
            font-weight: 600;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #444;
            color: #e0e0e0;
        }

        .btn:hover {
            background: #555;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #2a2a2a;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #8b3a3a;
        }

        .btn-danger:hover {
            background: #a04a4a;
        }

        .btn-success {
            background: #3a8b5a;
        }

        .btn-success:hover {
            background: #4aaa6b;
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imageCanvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-panel {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            font-size: 0.9em;
            color: #e0e0e0;
        }

        .info-panel p {
            margin: 5px 0;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slider-container {
            margin: 10px 0;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #e0e0e0;
        }

        .slider-container input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .slider-value {
            text-align: right;
            font-size: 0.85em;
            color: #aaa;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #888;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .empty-state:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .empty-state.dragover {
            background: rgba(255, 255, 255, 0.1);
        }

        .empty-state .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            color: #666;
        }

        /* 裁剪框样式 */
        .crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .crop-box {
            position: absolute;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.3);
            cursor: move;
        }

        .crop-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #333;
            pointer-events: auto;
        }

        .crop-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .crop-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .crop-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .crop-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .crop-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .crop-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .crop-handle.w { top: 50%; left: -6px; transform: translateY(-50%); cursor: w-resize; }
        .crop-handle.e { top: 50%; right: -6px; transform: translateY(-50%); cursor: e-resize; }

        .crop-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .crop-controls .btn {
            min-width: 80px;
        }

        /* 文本框样式 */
        .text-box {
            position: absolute;
            border: 2px dashed #fff;
            background: rgba(255, 255, 255, 0.1);
            cursor: move;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }

        .text-box.dragging {
            border-style: solid;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>

    <div class="main-content">
            <div class="sidebar">
                <div class="section">
                    <h3>基础滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyFilter('grayscale')" disabled>灰度</button>
                        <button class="btn" onclick="applyFilter('sepia')" disabled>复古</button>
                        <button class="btn" onclick="applyFilter('invert')" disabled>反色</button>
                        <button class="btn" onclick="applyThreshold()" disabled>二值化</button>
                    </div>
                </div>

                <div class="section">
                    <h3>单色效果</h3>
                    <div class="btn-group" style="grid-template-columns: repeat(2, 1fr);">
                        <button class="btn" onclick="applyGrayscaleShades()" disabled>灰度着色</button>
                        <button class="btn" onclick="applyGrayscaleHumanCorrected()" disabled>人类感知</button>
                        <button class="btn" onclick="applyBGrayscale()" disabled>蓝色灰度</button>
                        <button class="btn" onclick="applyDesaturate()" disabled>去饱和</button>
                        <button class="btn" onclick="applyDecomposeMax()" disabled>最大分解</button>
                        <button class="btn" onclick="applyDecomposeMin()" disabled>最小分解</button>
                    </div>
                </div>

                <div class="section">
                    <h3>色调滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPresetFilter('oceanic')" disabled>海洋</button>
                        <button class="btn" onclick="applyPresetFilter('islands')" disabled>岛屿</button>
                        <button class="btn" onclick="applyPresetFilter('marine')" disabled>深海</button>
                        <button class="btn" onclick="applyPresetFilter('seagreen')" disabled>海绿</button>
                        <button class="btn" onclick="applyPresetFilter('flagblue')" disabled>皇家蓝</button>
                        <button class="btn" onclick="applyPresetFilter('diamante')" disabled>钻石</button>
                        <button class="btn" onclick="applyPresetFilter('liquid')" disabled>液态</button>
                        <button class="btn" onclick="applyPresetFilter('bluechrome')" disabled>蓝铬</button>
                        <button class="btn" onclick="applyPresetFilter('perfume')" disabled>香水</button>
                        <button class="btn" onclick="applyPresetFilter('serenity')" disabled>宁静</button>
                    </div>
                </div>

                <div class="section">
                    <h3>复古滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPresetFilter('lofi')" disabled>复古风</button>
                        <button class="btn" onclick="applyPresetFilter('vintage')" disabled>怀旧</button>
                        <button class="btn" onclick="applyPresetFilter('dramatic')" disabled>戏剧</button>
                        <button class="btn" onclick="applyPresetFilter('pastel_pink')" disabled>粉红</button>
                        <button class="btn" onclick="applyPresetFilter('cali')" disabled>加州</button>
                        <button class="btn" onclick="applyPresetFilter('firenze')" disabled>佛罗伦萨</button>
                        <button class="btn" onclick="applyPresetFilter('obsidian')" disabled>黑曜</button>
                        <button class="btn" onclick="applyPresetFilter('golden')" disabled>金色</button>
                        <button class="btn" onclick="applyPresetFilter('radio')" disabled>广播</button>
                        <button class="btn" onclick="applyPresetFilter('twenties')" disabled>二十年代</button>
                    </div>
                </div>

                <div class="section">
                    <h3>单色调滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPresetFilter('rosetint')" disabled>玫瑰</button>
                        <button class="btn" onclick="applyPresetFilter('mauve')" disabled>紫罗兰</button>
                        <button class="btn" onclick="applyPresetFilter('duotone_violette')" disabled>紫双色</button>
                        <button class="btn" onclick="applyPresetFilter('duotone_horizon')" disabled>地平线</button>
                        <button class="btn" onclick="applyPresetFilter('duotone_lilac')" disabled>丁香</button>
                        <button class="btn" onclick="applyPresetFilter('duotone_ochre')" disabled>赭石</button>
                    </div>
                </div>

                <div class="section">
                    <h3>特效滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPresetFilter('neue')" disabled>霓虹蓝</button>
                        <button class="btn" onclick="applyPresetFilter('lix')" disabled>霓虹黄</button>
                        <button class="btn" onclick="applyPresetFilter('ryo')" disabled>霓虹洋红</button>
                    </div>
                </div>

                <div class="section">
                    <h3>模糊效果</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyBoxBlur()" disabled>盒式模糊</button>
                        <button class="btn" onclick="applyGaussianBlur()" disabled>高斯模糊</button>
                    </div>
                </div>

                <div class="section">
                    <h3>边缘检测</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applySobelHorizontal()" disabled>Sobel 水平</button>
                        <button class="btn" onclick="applySobelVertical()" disabled>Sobel 垂直</button>
                        <button class="btn" onclick="applySobelGlobal()" disabled>Sobel 全局</button>
                        <button class="btn" onclick="applyPrewittHorizontal()" disabled>Prewitt 水平</button>
                        <button class="btn" onclick="applyEdgeDetection()" disabled>基础边缘</button>
                    </div>
                </div>

                <div class="section">
                    <h3>卷积效果</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyLaplace()" disabled>Laplace</button>
                        <button class="btn" onclick="applyEmboss()" disabled>浮雕</button>
                        <button class="btn" onclick="applyIdentity()" disabled>身份</button>
                        <button class="btn" onclick="applyEdgeOne()" disabled>边缘1</button>
                    </div>
                </div>

                <div class="section">
                    <h3>线条检测</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyDetectHorizontalLines()" disabled>水平线</button>
                        <button class="btn" onclick="applyDetectVerticalLines()" disabled>垂直线</button>
                        <button class="btn" onclick="applyDetect45DegLines()" disabled>45度线</button>
                        <button class="btn" onclick="applyDetect135DegLines()" disabled>135度线</button>
                    </div>
                </div>

                <div class="section">
                    <h3>特殊效果</h3>
                    <div class="btn-group" style="grid-template-columns: repeat(3, 1fr);">
                        <button class="btn" onclick="applyPixelate()" disabled>像素化</button>
                        <button class="btn" onclick="applyHalftone()" disabled>半色调</button>
                        <button class="btn" onclick="applySolarize()" disabled>曝光</button>
                        <button class="btn" onclick="applyDither()" disabled>抖动</button>
                        <button class="btn" onclick="applyOil()" disabled>油画</button>
                        <button class="btn" onclick="applyDuotone()" disabled>双色</button>
                        <button class="btn" onclick="applyPrimary()" disabled>主色</button>
                        <button class="btn" onclick="applyColorize()" disabled>着色</button>
                        <button class="btn" onclick="applyFrostedGlass()" disabled>毛玻璃</button>
                        <button class="btn" onclick="applyTint()" disabled>色调</button>
                    </div>
                </div>

                <div class="section">
                    <h3>条纹效果</h3>
                    <div class="btn-group" style="grid-template-columns: repeat(2, 1fr);">
                        <button class="btn" onclick="applyHorizontalStrips()" disabled>水平条纹</button>
                        <button class="btn" onclick="applyVerticalStrips()" disabled>垂直条纹</button>
                        <button class="btn" onclick="applyColorHorizontalStrips()" disabled>彩色水平</button>
                        <button class="btn" onclick="applyColorVerticalStrips()" disabled>彩色垂直</button>
                    </div>
                </div>

                <div class="section">
                    <h3>色彩校正</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyNormalize()" disabled>归一化</button>
                    </div>
                </div>

                <div class="section">
                    <h3>无级调节</h3>
                    <div class="slider-container">
                        <label>亮度 (-100 ~ 100)</label>
                        <input type="range" id="brightnessSlider" min="-100" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="brightnessValue">0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>对比度 (0 ~ 200)</label>
                        <input type="range" id="contrastSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="contrastValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>饱和度 (0 ~ 200)</label>
                        <input type="range" id="saturationSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="saturationValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>色相 (-180 ~ 180)</label>
                        <input type="range" id="hueSlider" min="-180" max="180" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="hueValue">0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>明度与伽马</h3>
                    <div class="slider-container">
                        <label>明度 (0 ~ 200)</label>
                        <input type="range" id="lightnessSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="lightnessValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>色彩空间</label>
                        <select id="colorSpaceSelect" onchange="applyAdjustments()" disabled style="width: 100%; padding: 8px; background: #444; color: #e0e0e0; border: 1px solid #555; border-radius: 6px;">
                            <option value="hsl">HSL (默认)</option>
                            <option value="lch">LCh</option>
                            <option value="hsv">HSV</option>
                            <option value="hsluv">HSLuv</option>
                            <option value="auto">智能识别</option>
                        </select>
                    </div>
                    <div class="slider-container">
                        <label>伽马 R (0.1 ~ 10)</label>
                        <input type="range" id="gammaRedSlider" min="1" max="100" value="10" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="gammaRedValue">1.0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>伽马 G (0.1 ~ 10)</label>
                        <input type="range" id="gammaGreenSlider" min="1" max="100" value="10" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="gammaGreenValue">1.0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>伽马 B (0.1 ~ 10)</label>
                        <input type="range" id="gammaBlueSlider" min="1" max="100" value="10" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="gammaBlueValue">1.0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>锐化</h3>
                    <div class="slider-container">
                        <label>锐度 (0 ~ 10)</label>
                        <input type="range" id="sharpenSlider" min="0" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="sharpenValue">0.0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>降噪</h3>
                    <div class="slider-container">
                        <label>降噪强度 (0 ~ 10)</label>
                        <input type="range" id="noiseReductionSlider" min="0" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="noiseReductionValue">0.0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>噪点</h3>
                    <div class="slider-container">
                        <label>噪点强度 (0 ~ 10)</label>
                        <input type="range" id="noiseSlider" min="0" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="noiseValue">0.0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>通道调整</h3>
                    <div class="slider-container">
                        <label>红色通道 (-255 ~ 255)</label>
                        <input type="range" id="redChannelSlider" min="-255" max="255" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="redChannelValue">0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>绿色通道 (-255 ~ 255)</label>
                        <input type="range" id="greenChannelSlider" min="-255" max="255" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="greenChannelValue">0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>蓝色通道 (-255 ~ 255)</label>
                        <input type="range" id="blueChannelSlider" min="-255" max="255" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="blueChannelValue">0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>文本绘制</h3>
                    <div style="margin-bottom: 10px;">
                        <input type="text" id="textInput" placeholder="输入文本..." style="width: 100%; padding: 8px; background: #444; color: #e0e0e0; border: 1px solid #555; border-radius: 6px;" disabled>
                    </div>
                    <div class="slider-container">
                        <label>字体大小 (10 ~ 200)</label>
                        <input type="range" id="fontSizeSlider" min="10" max="200" value="60" disabled>
                        <div class="slider-value"><span id="fontSizeValue">60</span></div>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer; color: #e0e0e0; font-size: 0.9em;">
                            <span>文本颜色</span>
                            <input type="color" id="textColorPicker" value="#ffffff" style="width: 50px; height: 30px; cursor: pointer;" disabled>
                        </label>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display: flex; align-items: center; justify-content: space-between; cursor: pointer; color: #e0e0e0; font-size: 0.9em;">
                            <span>字体样式</span>
                            <select id="fontSelect" style="padding: 4px; background: #444; color: #e0e0e0; border: 1px solid #555; border-radius: 4px; max-width: 150px;" disabled>
                                <optgroup label="Roboto 英文">
                                    <option value="0">Roboto 常规</option>
                                    <option value="1">Roboto 粗体</option>
                                </optgroup>
                                <optgroup label="阿里普惠体">
                                    <option value="2">普惠体 细体</option>
                                    <option value="3">普惠体 常规</option>
                                    <option value="4">普惠体 常规 L3</option>
                                    <option value="5">普惠体 中等</option>
                                    <option value="6">普惠体 半粗</option>
                                    <option value="7">普惠体 粗体</option>
                                    <option value="8">普惠体 特粗</option>
                                    <option value="9">普惠体 重体</option>
                                    <option value="10">普惠体 黑体</option>
                                </optgroup>
                                <optgroup label="其他字体">
                                    <option value="11">FreeSerif 衬线</option>

    <script type="module">
        import init, { ImageProcessor } from './photon-wasm/pkg/photon_wasm.js?v=7';

        let wasmModule = null;
        let processor = null;
        let originalImageData = null;
        let currentImage = null;
        
        // 历史记录管理
        let historyStack = [];
        let redoStack = [];
        const MAX_HISTORY = 30;

        // 文本绘制相关变量
        let isTextMode = false;
        let isTextDragging = false;
        let textBox = { x: 0, y: 0, text: '', fontSize: 60, color: '#ffffff', withShadow: false };
        let textDragStart = { x: 0, y: 0 };
        let initialTextBox = { x: 0, y: 0 };

        // 保存当前状态到历史记录
        function saveToHistory() {
            if (!processor) return;
            
            const state = {
                base64: processor.to_base64(),
                width: processor.get_width(),
                height: processor.get_height()
            };
            
            historyStack.push(state);
            if (historyStack.length > MAX_HISTORY) {
                historyStack.shift();
            }
            
            // 清空重做栈
            redoStack = [];
            
            updateUndoRedoButtons();
        }

        // 撤销
        window.undo = function() {
            if (historyStack.length === 0) return;
            
            // 保存当前状态到重做栈
            redoStack.push({
                base64: processor.to_base64(),
                width: processor.get_width(),
                height: processor.get_height()
            });
            
            // 恢复上一个状态
            const state = historyStack.pop();
            restoreState(state);
            
            updateUndoRedoButtons();
        }

        // 重做
        window.redo = function() {
            if (redoStack.length === 0) return;
            
            // 保存当前状态到历史栈
            historyStack.push({
                base64: processor.to_base64(),
                width: processor.get_width(),
                height: processor.get_height()
            });
            
            // 恢复重做状态
            const state = redoStack.pop();
            restoreState(state);
            
            updateUndoRedoButtons();
        }

        // 恢复状态
        function restoreState(state) {
            // 提取纯 base64 数据（移除可能的 data URI 前缀）
            const base64Data = state.base64.includes(',') ? state.base64.split(',')[1] : state.base64;
            const uint8Array = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
            processor = ImageProcessor.new_from_bytes(uint8Array);
            updateCanvas();
        }

        // 更新撤销/重做按钮状态
        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = historyStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // 更新字体大小显示和文本框预览
        document.getElementById('fontSizeSlider').addEventListener('input', function() {
            document.getElementById('fontSizeValue').textContent = this.value;
            updateTextBoxPreview();
        });

        // 文本输入框实时更新预览
        document.getElementById('textInput').addEventListener('input', function() {
            updateTextBoxPreview();
        });

        // 颜色选择器实时更新预览
        document.getElementById('textColorPicker').addEventListener('input', function() {
            updateTextBoxPreview();
        });

        // 初始化 WASM 模块
        async function initWasm() {
            showLoading(true);
            try {
                wasmModule = await init();
                console.log('WebAssembly module loaded successfully');
                enableButtons();
            } catch (error) {
                console.error('Failed to load WebAssembly:', error);
                alert('WebAssembly 模块加载失败，请确保服务器支持 WASM');
            }
            showLoading(false);
        }

        // 显示/隐藏加载动画
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        // 启用按钮
        function enableButtons() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                // 下载和清空图像按钮需要 currentImage
                if (btn.getAttribute('onclick')?.includes('downloadImage') || 
                    btn.getAttribute('onclick')?.includes('clearImage')) {
                    btn.disabled = !currentImage;
                }
                // 其他非危险按钮
                else if (!btn.classList.contains('btn-danger')) {
                    btn.disabled = !currentImage;
                }
            });

            // 启用滑块
            const sliders = document.querySelectorAll('input[type="range"]');
            sliders.forEach(slider => {
                slider.disabled = !currentImage;
            });

            // 启用选择器
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.disabled = !currentImage;
            });

            // 启用文本绘制控件
            document.getElementById('textInput').disabled = !currentImage;
            document.getElementById('fontSizeSlider').disabled = !currentImage;
            document.getElementById('textColorPicker').disabled = !currentImage;
            document.getElementById('fontSelect').disabled = !currentImage;
            document.getElementById('shadowCheckbox').disabled = !currentImage;
        }

        // 切换侧边栏
        window.toggleSidebar = function() {
            const sidebar = document.querySelector('.sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('hidden');
            if (sidebar.classList.contains('hidden')) {
                toggle.textContent = '▶';
                toggle.style.left = '0';
            } else {
                toggle.textContent = '☰';
                toggle.style.left = '320px';
            }
        }

        // 文件上传处理
        const emptyState = document.getElementById('emptyState');
        const editorArea = document.querySelector('.editor-area');

        // 点击整个编辑区域触发上传（仅在没有图片时）
        editorArea.addEventListener('click', (e) => {
            if (!currentImage && !e.target.closest('.sidebar')) {
                document.getElementById('fileInput').click();
            }
        });

        // 整个编辑区域支持拖拽
        editorArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (!currentImage) {
                emptyState.classList.add('dragover');
            }
        });

        editorArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            emptyState.classList.remove('dragover');
        });

        editorArea.addEventListener('drop', (e) => {
            e.preventDefault();
            emptyState.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // 加载图片
        async function loadImage(file) {
            showLoading(true);
            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                if (wasmModule) {
                    processor = ImageProcessor.new_from_bytes(uint8Array);
                    const width = processor.get_width();
                    const height = processor.get_height();

                    // 保存原始处理器用于无级调节
                    originalProcessor = ImageProcessor.new_from_bytes(uint8Array);

                    // 使用 get_base64() 获取图像数据并绘制到 Canvas
                    const base64 = processor.to_base64();

                    const canvas = document.getElementById('imageCanvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    // 创建图像对象
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0);
                        // 保存原始图像数据
                        originalImageData = ctx.getImageData(0, 0, width, height);
                        currentImage = {
                            data: new Uint8ClampedArray(originalImageData.data),
                            width,
                            height
                        };

                        document.getElementById('emptyState').style.display = 'none';
                        canvas.style.display = 'block';

                        document.getElementById('imageSize').textContent = `${width} x ${height}`;
                        document.getElementById('imageFormat').textContent = file.type.split('/')[1].toUpperCase();

                        enableButtons();
                    };
                    img.onerror = () => {
                        console.error('Failed to load image from base64');
                        alert('图片显示失败');
                    };
                    img.src = base64;
                }
            } catch (error) {
                console.error('Failed to load image:', error);
                alert('图片加载失败');
            }
            showLoading(false);
        }

        // 应用滤镜
        window.applyFilter = function(filterType) {
            if (!processor) return;
            showLoading(true);
            // 保存状态到历史记录
            saveToHistory();
            try {
                switch (filterType) {
                    case 'grayscale':
                        processor.apply_grayscale();
                        break;
                    case 'sepia':
                        processor.apply_sepia();
                        break;
                    case 'invert':
                        processor.apply_invert();
                        break;
                }
                updateCanvas();
            } catch (error) {
                console.error('Filter error:', error);

            showLoading(false);
        };

        // 应用无级调节
        let adjustmentTimeout = null;
        let originalProcessor = null; // 保存原始处理器用于无级调节
        window.applyAdjustments = function() {
            if (!processor) return;

            // 获取滑块值
            const brightness = parseInt(document.getElementById('brightnessSlider').value);
            const contrast = parseFloat(document.getElementById('contrastSlider').value);
            const saturation = parseFloat(document.getElementById('saturationSlider').value);
            const hue = parseInt(document.getElementById('hueSlider').value);
            const lightness = parseFloat(document.getElementById('lightnessSlider').value);
            const colorSpace = document.getElementById('colorSpaceSelect').value;
            const gammaRed = parseFloat(document.getElementById('gammaRedSlider').value) / 10;
            const gammaGreen = parseFloat(document.getElementById('gammaGreenSlider').value) / 10;
            const gammaBlue = parseFloat(document.getElementById('gammaBlueSlider').value) / 10;
            const sharpenStrength = parseFloat(document.getElementById('sharpenSlider').value) / 10;
            const noiseReductionStrength = parseFloat(document.getElementById('noiseReductionSlider').value) / 10;
            const noiseStrength = parseFloat(document.getElementById('noiseSlider').value) / 10;
            const redChannelOffset = parseInt(document.getElementById('redChannelSlider').value);
            const greenChannelOffset = parseInt(document.getElementById('greenChannelSlider').value);
            const blueChannelOffset = parseInt(document.getElementById('blueChannelSlider').value);

            // 更新显示值
            document.getElementById('brightnessValue').textContent = brightness;
            document.getElementById('contrastValue').textContent = contrast;
            document.getElementById('saturationValue').textContent = saturation;
            document.getElementById('hueValue').textContent = hue;
            document.getElementById('lightnessValue').textContent = lightness;
            document.getElementById('gammaRedValue').textContent = gammaRed.toFixed(1);
            document.getElementById('gammaGreenValue').textContent = gammaGreen.toFixed(1);
            document.getElementById('gammaBlueValue').textContent = gammaBlue.toFixed(1);
            document.getElementById('sharpenValue').textContent = sharpenStrength.toFixed(1);
            document.getElementById('noiseReductionValue').textContent = noiseReductionStrength.toFixed(1);
            document.getElementById('noiseValue').textContent = noiseStrength.toFixed(1);
            document.getElementById('redChannelValue').textContent = redChannelOffset;
            document.getElementById('greenChannelValue').textContent = greenChannelOffset;
            document.getElementById('blueChannelValue').textContent = blueChannelOffset;

            // 应用调整
            try {
                // 基于原始图像应用所有调整
                if (originalProcessor) {
                    // 创建新的处理器实例（基于原始图像）
                    const base64 = originalProcessor.to_base64();
                    const base64Data = base64.includes(',') ? base64.split(',')[1] : base64;
                    const uint8Array = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                    processor = ImageProcessor.new_from_bytes(uint8Array);
                    
                    // 应用亮度 (-255 到 255)
                    const adjustedBrightness = Math.max(-255, Math.min(255, brightness));
                    if (adjustedBrightness !== 0) {
                        processor.apply_brightness(adjustedBrightness);
                    }
                    
                    // 应用对比度 (-255 到 255，从 0-200 转换)
                    const adjustedContrast = (contrast - 100) * 2.55; // 转换为 -255 到 255
                    const clampedContrast = Math.max(-255, Math.min(255, adjustedContrast));
                    if (clampedContrast !== 0) {
                        processor.apply_contrast(clampedContrast);
                    }
                    
                    // 应用饱和度 (-1 到 1，从 0-200 转换)
                    const adjustedSaturation = (saturation - 100) / 100; // 转换为 -1 到 1
                    const clampedSaturation = Math.max(-1, Math.min(1, adjustedSaturation));
                    if (clampedSaturation !== 0) {
                        processor.apply_saturation(clampedSaturation);
                    }
                    
                    // 应用色相 (-360 到 360)
                    const adjustedHue = Math.max(-360, Math.min(360, hue));
                    if (adjustedHue !== 0) {
                        processor.apply_hue(adjustedHue);
                    }

                    // 应用明度 (-1 到 1，从 0-200 转换)
                    const adjustedLightness = (lightness - 100) / 100; // 转换为 -1 到 1
                    const clampedLightness = Math.max(-1, Math.min(1, adjustedLightness));
                    if (clampedLightness !== 0) {
                        // 智能识别色彩空间
                        let selectedColorSpace = colorSpace;
                        if (colorSpace === 'auto') {
                            // 根据图像特征自动选择色彩空间
                            selectedColorSpace = autoDetectColorSpace();
                        }
                        processor.apply_lightness(clampedLightness, selectedColorSpace);
                    }

                    // 应用伽马校正 (0.1 到 10)
                    if (gammaRed !== 1.0 || gammaGreen !== 1.0 || gammaBlue !== 1.0) {
                        processor.apply_gamma(gammaRed, gammaGreen, gammaBlue);
                    }

                    // 应用锐化 (0.0 到 10.0)
                    if (sharpenStrength !== 0.0) {
                        processor.apply_sharpen(sharpenStrength);
                    }

                    // 应用降噪 (0.0 到 10.0)
                    if (noiseReductionStrength !== 0.0) {
                        processor.apply_noise_reduction(noiseReductionStrength);
                    }

                    // 应用噪点 (0.0 到 10.0)
                    if (noiseStrength !== 0.0) {
                        processor.apply_noise(noiseStrength);
                    }

                    // 应用通道调整 (-255 到 255)
                    if (redChannelOffset !== 0 || greenChannelOffset !== 0 || blueChannelOffset !== 0) {
                        processor.offset_channels(redChannelOffset, greenChannelOffset, blueChannelOffset);
                    }
                }
                
                updateCanvas();
                
                // 防抖动保存历史记录（用户停止调节 500ms 后保存）
                clearTimeout(adjustmentTimeout);
                adjustmentTimeout = setTimeout(() => {
                    saveToHistory();
                }, 500);
            } catch (error) {
                console.error('Adjustments error:', error);
            }
        };

        // 智能检测最佳色彩空间
        function autoDetectColorSpace() {
            // 简单的启发式规则：
            // - 对于大多数照片，HSL 通常是最佳选择
            // - 对于需要感知均匀性的场景，LCh 更好
            // - HSV 适用于饱和度优先的场景
            // - HSLuv 适用于需要色彩均匀性的场景
            
            // 这里使用 HSL 作为默认选择，因为它是应用最广泛的
            return 'hsl';
        }

        // 裁剪模式
        let isCropMode = false;
        let cropBox = { x: 0, y: 0, width: 0, height: 0 };
        let isDragging = false;
        let isResizing = false;
        let resizeHandle = null;
        let dragStart = { x: 0, y: 0 };
        let initialCropBox = { x: 0, y: 0, width: 0, height: 0 };

        // 进入裁剪模式
        window.cropImage = function() {
            if (!processor) return;
            isCropMode = true;
            
            // 初始化裁剪框为图像中心的一半大小
            const canvas = document.getElementById('imageCanvas');
            const width = canvas.width;
            const height = canvas.height;
            cropBox = {
                x: width * 0.25,
                y: height * 0.25,
                width: width * 0.5,
                height: height * 0.5
            };
            
            // 显示裁剪覆盖层
            const cropOverlay = document.getElementById('cropOverlay');
            cropOverlay.style.display = 'block';
            cropOverlay.width = width;
            cropOverlay.height = height;
            
            // 显示裁剪控制按钮
            document.getElementById('cropControls').style.display = 'flex';
            
            // 绘制裁剪框
            drawCropOverlay();
            
            // 添加事件监听
            setupCropEvents();
        };

        // 设置裁剪事件监听
        function setupCropEvents() {
            const cropOverlay = document.getElementById('cropOverlay');
            const canvas = document.getElementById('imageCanvas');
            
            // 移除旧的事件监听器（通过克隆节点）
            const newCropOverlay = cropOverlay.cloneNode(true);
            cropOverlay.parentNode.replaceChild(newCropOverlay, cropOverlay);
            
            // 更新引用
            const updatedCropOverlay = document.getElementById('cropOverlay');
            
            // 鼠标按下
            updatedCropOverlay.addEventListener('mousedown', (e) => {
                const rect = updatedCropOverlay.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                // 检查是否点击了裁剪框
                if (mouseX >= cropBox.x && mouseX <= cropBox.x + cropBox.width &&
                    mouseY >= cropBox.y && mouseY <= cropBox.y + cropBox.height) {
                    
                    // 检查是否点击了调整手柄
                    const handleSize = 10;
                    if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'nw';
                    } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'ne';
                    } else if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'sw';
                    } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'se';
                    } else {
                        isDragging = true;
                    }
                    
                    dragStart = { x: mouseX, y: mouseY };
                    initialCropBox = { ...cropBox };
                    e.preventDefault();
                }
            });

            // 鼠标移动
            updatedCropOverlay.addEventListener('mousemove', (e) => {
                if (!isCropMode) return;
                
                const rect = updatedCropOverlay.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = mouseX - dragStart.x;
                const dy = mouseY - dragStart.y;
                
                // 更新光标样式
                updateCursor(mouseX, mouseY, rect);
                
                if (isDragging) {
                    cropBox.x = Math.max(0, Math.min(canvas.width - cropBox.width, initialCropBox.x + dx));
                    cropBox.y = Math.max(0, Math.min(canvas.height - cropBox.height, initialCropBox.y + dy));
                    drawCropOverlay();
                } else if (isResizing) {
                    handleResize(dx, dy);
                    drawCropOverlay();
                }
            });

            // 鼠标释放
            updatedCropOverlay.addEventListener('mouseup', () => {
                isDragging = false;
                isResizing = false;
                resizeHandle = null;
            });
            
            // 鼠标离开
            updatedCropOverlay.addEventListener('mouseleave', () => {
                isDragging = false;
                isResizing = false;
                resizeHandle = null;
            });
        }

        // 更新光标样式
        function updateCursor(mouseX, mouseY, rect) {
            const canvas = document.getElementById('imageCanvas');
            const handleSize = 10;
            
            if (mouseX >= cropBox.x && mouseX <= cropBox.x + cropBox.width &&
                mouseY >= cropBox.y && mouseY <= cropBox.y + cropBox.height) {
                if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                    canvas.style.cursor = 'nw-resize';
                } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                    canvas.style.cursor = 'ne-resize';
                } else if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                    canvas.style.cursor = 'sw-resize';
                } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                    canvas.style.cursor = 'se-resize';
                } else {
                    canvas.style.cursor = 'move';
                }
            } else {
                canvas.style.cursor = 'default';
            }
        }

        // 处理调整大小
        function handleResize(dx, dy) {
            const canvas = document.getElementById('imageCanvas');
            const minSize = 20;
            
            switch (resizeHandle) {
                case 'nw':
                    cropBox.x = Math.max(0, initialCropBox.x + dx);
                    cropBox.y = Math.max(0, initialCropBox.y + dy);
                    cropBox.width = Math.max(minSize, initialCropBox.width - dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height - dy);
                    break;
                case 'ne':
                    cropBox.y = Math.max(0, initialCropBox.y + dy);
                    cropBox.width = Math.max(minSize, initialCropBox.width + dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height - dy);
                    break;
                case 'sw':
                    cropBox.x = Math.max(0, initialCropBox.x + dx);
                    cropBox.width = Math.max(minSize, initialCropBox.width - dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height + dy);
                    break;
                case 'se':
                    cropBox.width = Math.max(minSize, initialCropBox.width + dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height + dy);
                    break;
            }
            
            // 确保裁剪框在画布内
            cropBox.x = Math.max(0, Math.min(canvas.width - cropBox.width, cropBox.x));
            cropBox.y = Math.max(0, Math.min(canvas.height - cropBox.height, cropBox.y));
        }

        // 绘制裁剪覆盖层
        function drawCropOverlay() {
            const cropOverlay = document.getElementById('cropOverlay');
            const ctx = cropOverlay.getContext('2d');
            
            // 清空覆盖层
            ctx.clearRect(0, 0, cropOverlay.width, cropOverlay.height);
            
            // 绘制半透明遮罩
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, cropOverlay.width, cropOverlay.height);
            
            // 清除裁剪框区域的遮罩
            ctx.clearRect(cropBox.x, cropBox.y, cropBox.width, cropBox.height);
            
            // 绘制裁剪框边框
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(cropBox.x, cropBox.y, cropBox.width, cropBox.height);
            ctx.setLineDash([]);
            
            // 绘制三分线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            
            // 垂直线
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(cropBox.x + (cropBox.width / 3) * i, cropBox.y);
                ctx.lineTo(cropBox.x + (cropBox.width / 3) * i, cropBox.y + cropBox.height);
                ctx.stroke();
            }
            
            // 水平线
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(cropBox.x, cropBox.y + (cropBox.height / 3) * i);
                ctx.lineTo(cropBox.x + cropBox.width, cropBox.y + (cropBox.height / 3) * i);
                ctx.stroke();
            }
            
            // 绘制调整手柄
            const handleSize = 8;
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            
            // 四角
            ctx.fillRect(cropBox.x - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            
            ctx.fillRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            
            ctx.fillRect(cropBox.x - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
            
            ctx.fillRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
        }

        // 格式转换
        window.convertFormat = function(format) {
            if (!processor) return;
            
            let quality = 90; // 默认质量
            
            // JPEG 和 WebP 支持质量调整
            if (format === 'jpeg' || format === 'webp') {
                let qualityHint = '';
                if (format === 'webp') {
                    qualityHint = '\n注意：WebP 使用无损编码，质量参数不会显著影响文件大小';
                }
                
                const inputQuality = prompt(
                    `请输入${format === 'jpeg' ? 'JPEG' : 'WebP'}导出质量 (1-100):\n` +
                    `- 质量越高，文件越大，图像越清晰\n` +
                    `- 推荐值: 90 (高质量)\n` +
                    `- 网络传输建议: 70-85\n` +
                    `- 存档建议: 90-100${qualityHint}`,
                    '90'
                );
                
                if (inputQuality === null) {
                    return; // 用户取消
                }
                
                quality = parseInt(inputQuality);
                
                // 验证质量值
                if (isNaN(quality) || quality < 1 || quality > 100) {
                    alert('请输入 1-100 之间的质量值');
                    return;
                }
            }
            
            showLoading(true);
            try {
                let base64;
                let mimeType;
                
                switch (format) {
                    case 'png':
                        base64 = processor.to_png();
                        mimeType = 'image/png';
                        break;
                    case 'jpeg':
                        base64 = processor.to_jpeg(quality);
                        mimeType = 'image/jpeg';
                        break;
                    case 'webp':
                        base64 = processor.to_webp(quality);
                        mimeType = 'image/webp';
                        break;
                    default:
                        throw new Error('不支持的格式');
                }
                
                const link = document.createElement('a');
                link.download = `image.${format}`;
                link.href = `data:${mimeType};base64,${base64}`;
                link.click();
            } catch (error) {
                console.error('Convert error:', error);
                alert(`格式转换失败: ${error.message}`);
            }
            showLoading(false);
        };

        // 重置图片
        window.resetImage = function() {
            if (!processor) return;

            // 重置 WebAssembly 处理器
            processor.reset();

            // 重置滑块
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('contrastSlider').value = 100;
            document.getElementById('saturationSlider').value = 100;
            document.getElementById('hueSlider').value = 0;
            document.getElementById('lightnessSlider').value = 100;
            document.getElementById('colorSpaceSelect').value = 'hsl';
            document.getElementById('gammaRedSlider').value = 10;
            document.getElementById('gammaGreenSlider').value = 10;
            document.getElementById('gammaBlueSlider').value = 10;
            document.getElementById('sharpenSlider').value = 0;
            document.getElementById('noiseReductionSlider').value = 0;
            document.getElementById('noiseSlider').value = 0;

            // 重置显示值
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';
            document.getElementById('hueValue').textContent = '0';
            document.getElementById('lightnessValue').textContent = '100';
            document.getElementById('gammaRedValue').textContent = '1.0';
            document.getElementById('gammaGreenValue').textContent = '1.0';
            document.getElementById('gammaBlueValue').textContent = '1.0';
            document.getElementById('sharpenValue').textContent = '0.0';
            document.getElementById('noiseReductionValue').textContent = '0.0';
            document.getElementById('noiseValue').textContent = '0.0';

            // 更新画布
            updateCanvas();
        };

        // 清空图像
        window.clearImage = function() {
            if (!currentImage) return;

            // 清空处理器
            processor = null;
            originalProcessor = null;
            currentImage = null;
            originalImageData = null;

            // 清空画布
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.display = 'none';

            // 显示空状态
            document.getElementById('emptyState').style.display = 'block';

            // 重置信息面板
            document.getElementById('imageSize').textContent = '未加载';
            document.getElementById('imageFormat').textContent = '-';

            // 重置滑块
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('contrastSlider').value = 100;
            document.getElementById('saturationSlider').value = 100;
            document.getElementById('hueSlider').value = 0;
            document.getElementById('lightnessSlider').value = 100;
            document.getElementById('colorSpaceSelect').value = 'hsl';
            document.getElementById('gammaRedSlider').value = 10;
            document.getElementById('gammaGreenSlider').value = 10;
            document.getElementById('gammaBlueSlider').value = 10;
            document.getElementById('sharpenSlider').value = 0;
            document.getElementById('noiseReductionSlider').value = 0;

            // 重置显示值
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';
            document.getElementById('hueValue').textContent = '0';
            document.getElementById('lightnessValue').textContent = '100';
            document.getElementById('gammaRedValue').textContent = '1.0';
            document.getElementById('gammaGreenValue').textContent = '1.0';
            document.getElementById('gammaBlueValue').textContent = '1.0';
            document.getElementById('sharpenValue').textContent = '0.0';
            document.getElementById('noiseReductionValue').textContent = '0.0';

            // 禁用所有按钮
            enableButtons();
        };

        // 下载图片
        window.downloadImage = function() {
            const canvas = document.getElementById('imageCanvas');
            const link = document.createElement('a');
            link.download = 'edited_image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        // 进入文本添加模式
        window.addTextMode = function() {
            if (!processor) return;

            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('请输入文本');
                return;
            }

            isTextMode = true;
            textBox.text = text;
            textBox.fontSize = parseInt(document.getElementById('fontSizeSlider').value);
            textBox.color = document.getElementById('textColorPicker').value;
            textBox.withShadow = document.getElementById('shadowCheckbox').checked;

            // 计算初始位置（居中）
            const canvas = document.getElementById('imageCanvas');
            const canvasWidth = canvas.width;
            const canvasHeight = canvas.height;
            const textWidth = text.length * textBox.fontSize * 0.6;
            const textHeight = textBox.fontSize;

            textBox.x = (canvasWidth - textWidth) / 2;
            textBox.y = (canvasHeight - textHeight) / 2;

            // 显示文本框
            const textBoxEl = document.getElementById('textBox');
            textBoxEl.style.display = 'flex';
            textBoxEl.style.left = textBox.x + 'px';
            textBoxEl.style.top = textBox.y + 'px';
            textBoxEl.style.fontSize = textBox.fontSize + 'px';
            textBoxEl.style.color = textBox.color;
            textBoxEl.textContent = text;

            // 更新按钮显示
            document.getElementById('addTextBtn').style.display = 'none';
            document.getElementById('applyTextBtn').style.display = 'inline-block';
            document.getElementById('cancelTextBtn').style.display = 'inline-block';

            // 设置文本框事件
            setupTextBoxEvents();
        };

        // 设置文本框事件
        function setupTextBoxEvents() {
            const textBoxEl = document.getElementById('textBox');
            const canvas = document.getElementById('imageCanvas');
            const canvasContainer = document.getElementById('canvasContainer');

            // 鼠标按下
            textBoxEl.addEventListener('mousedown', (e) => {
                if (!isTextMode) return;

                isTextDragging = true;
                textBoxEl.classList.add('dragging');

                const rect = canvasContainer.getBoundingClientRect();
                textDragStart = {
                    x: e.clientX - rect.left - textBox.x,
                    y: e.clientY - rect.top - textBox.y
                };

                initialTextBox = { x: textBox.x, y: textBox.y };
                e.preventDefault();
                e.stopPropagation();
            });

            // 鼠标移动（在 canvas-container 上）
            canvasContainer.addEventListener('mousemove', (e) => {
                if (!isTextMode || !isTextDragging) return;

                const rect = canvasContainer.getBoundingClientRect();
                const canvas = document.getElementById('imageCanvas');

                // 计算新的文本框位置
                let newX = e.clientX - rect.left - textDragStart.x;
                let newY = e.clientY - rect.top - textDragStart.y;

                // 限制在画布范围内
                const textBoxEl = document.getElementById('textBox');
                const textWidth = textBoxEl.offsetWidth;
                const textHeight = textBoxEl.offsetHeight;

                newX = Math.max(0, Math.min(canvas.width - textWidth, newX));
                newY = Math.max(0, Math.min(canvas.height - textHeight, newY));

                textBox.x = newX;
                textBox.y = newY;

                textBoxEl.style.left = newX + 'px';
                textBoxEl.style.top = newY + 'px';
            });

            // 鼠标释放
            canvasContainer.addEventListener('mouseup', () => {
                isTextDragging = false;
                const textBoxEl = document.getElementById('textBox');
                if (textBoxEl) textBoxEl.classList.remove('dragging');
            });

            // 鼠标离开
            canvasContainer.addEventListener('mouseleave', () => {
                isTextDragging = false;
                const textBoxEl = document.getElementById('textBox');
                if (textBoxEl) textBoxEl.classList.remove('dragging');
            });
        }

        // 更新文本框预览
        function updateTextBoxPreview() {
            if (!isTextMode) return;

            const textBoxEl = document.getElementById('textBox');
            textBoxEl.textContent = document.getElementById('textInput').value;
            textBoxEl.style.fontSize = document.getElementById('fontSizeSlider').value + 'px';
            textBoxEl.style.color = document.getElementById('textColorPicker').value;
        }

        // 应用文本绘制
        window.applyText = function() {
            if (!processor || !isTextMode) return;

            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                alert('请输入文本');
                return;
            }

            showLoading(true);
            try {
                saveToHistory();

                const fontSize = parseInt(document.getElementById('fontSizeSlider').value);
                const colorHex = document.getElementById('textColorPicker').value;
                const withShadow = document.getElementById('shadowCheckbox').checked;
                const fontType = parseInt(document.getElementById('fontSelect').value);

                // 转换颜色
                const r = parseInt(colorHex.slice(1, 3), 16);
                const g = parseInt(colorHex.slice(3, 5), 16);
                const b = parseInt(colorHex.slice(5, 7), 16);

                // 计算绘制位置（考虑字体基线）
                const drawX = Math.floor(textBox.x + 10);
                const drawY = Math.floor(textBox.y + fontSize * 0.75);

                if (withShadow) {
                    processor.draw_text_with_shadow_and_color_and_font(text, drawX, drawY, fontSize, r, g, b, fontType);
                } else {
                    processor.draw_text_with_color_and_font(text, drawX, drawY, fontSize, r, g, b, fontType);
                }

                updateCanvas();
                cancelTextMode();
            } catch (error) {
                console.error('Text draw error:', error);
                alert(`文本绘制失败: ${error.message}`);
            }
            showLoading(false);
        };

        // 取消文本模式
        window.cancelTextMode = function() {
            isTextMode = false;
            isTextDragging = false;

            // 隐藏文本框
            const textBoxEl = document.getElementById('textBox');
            textBoxEl.style.display = 'none';
            textBoxEl.classList.remove('dragging');

            // 恢复按钮显示
            document.getElementById('addTextBtn').style.display = 'inline-block';
            document.getElementById('applyTextBtn').style.display = 'none';
            document.getElementById('cancelTextBtn').style.display = 'none';
        };

        // 更新画布
        function updateCanvas() {
            if (!processor) return;
            const width = processor.get_width();
            const height = processor.get_height();

            // 使用 get_base64() 获取图像数据并绘制到 Canvas
            const base64 = processor.to_base64();

            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');

            // 更新画布尺寸
            canvas.width = width;
            canvas.height = height;

            // 创建图像对象
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
            };
            img.src = base64;

            // 更新文件大小显示
            const fileSize = Number(processor.get_estimated_filesize());
            const fileSizeKB = (fileSize / 1024).toFixed(2);
            const fileSizeMB = (fileSize / (1024 * 1024)).toFixed(2);
            const fileSizeStr = fileSize > 1024 * 1024
                ? `${fileSizeMB} MB`
                : `${fileSizeKB} KB`;
            document.getElementById('fileSize').textContent = fileSizeStr;
        }

        // 初始化
        initWasm();
    </script>
