<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAssembly 图像处理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #2c2c2c;
            min-height: 100vh;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            display: flex;
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #444;
            color: white;
            border: none;
            padding: 15px 8px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 0 5px 5px 0;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: #555;
        }

        .sidebar {
            width: 320px;
            background: #333;
            padding: 20px;
            border-right: 1px solid #444;
            overflow-y: auto;
            overflow-x: hidden;
            transition: margin-left 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: #555 #333;
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #333;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .sidebar.hidden {
            margin-left: -320px;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            overflow: hidden;
            padding: 0;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h3 {
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 1.1em;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
        }

        .upload-area {
            border: 2px dashed #555;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #2a2a2a;
        }

        .upload-area:hover {
            background: #3a3a3a;
            border-color: #666;
        }

        .upload-area.dragover {
            background: #4a4a4a;
            border-color: #777;
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            color: #888;
        }

        .upload-text {
            color: #aaa;
            font-weight: 600;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #444;
            color: #e0e0e0;
        }

        .btn:hover {
            background: #555;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #2a2a2a;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #8b3a3a;
        }

        .btn-danger:hover {
            background: #a04a4a;
        }

        .btn-success {
            background: #3a8b5a;
        }

        .btn-success:hover {
            background: #4aaa6b;
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imageCanvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-panel {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            font-size: 0.9em;
            color: #e0e0e0;
        }

        .info-panel p {
            margin: 5px 0;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slider-container {
            margin: 10px 0;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #e0e0e0;
        }

        .slider-container input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .slider-value {
            text-align: right;
            font-size: 0.85em;
            color: #aaa;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #888;
            font-size: 1.2em;
        }

        .empty-state .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>

    <div class="main-content">
            <div class="sidebar">
                <div class="section">
                    <h3>基础滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyFilter('grayscale')" disabled>灰度</button>
                        <button class="btn" onclick="applyFilter('sepia')" disabled>复古</button>
                        <button class="btn" onclick="applyFilter('invert')" disabled>反色</button>
                        <button class="btn" onclick="applyThreshold()" disabled>二值化</button>
                    </div>
                </div>

                <div class="section">
                    <h3>预设滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPresetFilter('oceanic')" disabled>海洋</button>
                        <button class="btn" onclick="applyPresetFilter('lofi')" disabled>复古风</button>
                        <button class="btn" onclick="applyPresetFilter('vintage')" disabled>怀旧</button>
                        <button class="btn" onclick="applyPresetFilter('dramatic')" disabled>戏剧</button>
                        <button class="btn" onclick="applyPresetFilter('pastel_pink')" disabled>粉红</button>
                        <button class="btn" onclick="applyPresetFilter('cali')" disabled>加州</button>
                        <button class="btn" onclick="applyPresetFilter('firenze')" disabled>佛罗伦萨</button>
                        <button class="btn" onclick="applyPresetFilter('obsidian')" disabled>黑曜</button>
                    </div>
                </div>

                <div class="section">
                    <h3>特殊效果</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPixelate()" disabled>像素化</button>
                        <button class="btn" onclick="applyHalftone()" disabled>半色调</button>
                        <button class="btn" onclick="applySolarize()" disabled>曝光</button>
                        <button class="btn" onclick="applyDither()" disabled>抖动</button>
                        <button class="btn" onclick="applyOil()" disabled>油画</button>
                        <button class="btn" onclick="applyDuotone()" disabled>双色</button>
                    </div>
                </div>

                <div class="section">
                    <h3>无级调节</h3>
                    <div class="slider-container">
                        <label>亮度 (-100 ~ 100)</label>
                        <input type="range" id="brightnessSlider" min="-100" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="brightnessValue">0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>对比度 (0 ~ 200)</label>
                        <input type="range" id="contrastSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="contrastValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>饱和度 (0 ~ 200)</label>
                        <input type="range" id="saturationSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="saturationValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>色相 (-180 ~ 180)</label>
                        <input type="range" id="hueSlider" min="-180" max="180" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="hueValue">0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>变换操作</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="rotateImage()" disabled>旋转 90°</button>
                        <button class="btn" onclick="flipHorizontal()" disabled>水平翻转</button>
                        <button class="btn" onclick="flipVertical()" disabled>垂直翻转</button>
                        <button class="btn" onclick="resizeImage()" disabled>缩放</button>
                        <button class="btn" onclick="cropImage()" disabled>裁剪</button>
                    </div>
                </div>

                <div class="section">
                    <h3>格式转换</h3>
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="convertFormat('png')" disabled>转 PNG</button>
                        <button class="btn btn-success" onclick="convertFormat('jpeg')" disabled>转 JPEG</button>
                    </div>
                </div>

                <div class="section">
                    <h3>操作</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="resetImage()" disabled>重置</button>
                        <button class="btn btn-danger" onclick="clearImage()" disabled>清空图像</button>
                        <button class="btn btn-danger" onclick="downloadImage()" disabled>下载</button>
                    </div>
                </div>

                <div class="info-panel" id="infoPanel">
                    <p>尺寸: <span id="imageSize">未加载</span></p>
                    <p>格式: <span id="imageFormat">-</span></p>
                </div>
            </div>

            <div class="editor-area">
                <div class="canvas-container" id="canvasContainer">
                    <div class="empty-state" id="emptyState">
                        <svg class="icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>请上传图片开始编辑</p>
                        <div class="upload-area" id="uploadArea" style="margin-top: 20px;">
                            <svg class="upload-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <div class="upload-text">点击或拖拽上传</div>
                            <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        </div>
                    </div>
                    <canvas id="imageCanvas" style="display: none;"></canvas>
                </div>
            </div>
    </div>

    <script type="module">
        import init, { ImageProcessor } from './photon-wasm/pkg/photon_wasm.js';

        let wasmModule = null;
        let processor = null;
        let originalImageData = null;
        let currentImage = null;

        // 初始化 WASM 模块
        async function initWasm() {
            showLoading(true);
            try {
                wasmModule = await init();
                console.log('WebAssembly module loaded successfully');
                enableButtons();
            } catch (error) {
                console.error('Failed to load WebAssembly:', error);
                alert('WebAssembly 模块加载失败，请确保服务器支持 WASM');
            }
            showLoading(false);
        }

        // 显示/隐藏加载动画
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        // 启用按钮
        function enableButtons() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                // 下载和清空图像按钮需要 currentImage
                if (btn.getAttribute('onclick')?.includes('downloadImage') || 
                    btn.getAttribute('onclick')?.includes('clearImage')) {
                    btn.disabled = !currentImage;
                }
                // 其他非危险按钮
                else if (!btn.classList.contains('btn-danger')) {
                    btn.disabled = !currentImage;
                }
            });

            // 启用滑块
            const sliders = document.querySelectorAll('input[type="range"]');
            sliders.forEach(slider => {
                slider.disabled = !currentImage;
            });
        }

        // 切换侧边栏
        window.toggleSidebar = function() {
            const sidebar = document.querySelector('.sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('hidden');
            if (sidebar.classList.contains('hidden')) {
                toggle.textContent = '▶';
                toggle.style.left = '0';
            } else {
                toggle.textContent = '☰';
                toggle.style.left = '320px';
            }
        }

        // 文件上传处理
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('uploadArea').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').classList.add('dragover');
        });

        document.getElementById('uploadArea').addEventListener('dragleave', () => {
            document.getElementById('uploadArea').classList.remove('dragover');
        });

        document.getElementById('uploadArea').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // 加载图片
        async function loadImage(file) {
            showLoading(true);
            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                if (wasmModule) {
                    processor = ImageProcessor.new_from_bytes(uint8Array);
                    const width = processor.get_width();
                    const height = processor.get_height();

                    // 使用 get_base64() 获取图像数据并绘制到 Canvas
                    const base64 = processor.to_base64();

                    const canvas = document.getElementById('imageCanvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    // 创建图像对象
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0);
                        // 保存原始图像数据
                        originalImageData = ctx.getImageData(0, 0, width, height);
                        currentImage = {
                            data: new Uint8ClampedArray(originalImageData.data),
                            width,
                            height
                        };

                        document.getElementById('emptyState').style.display = 'none';
                        canvas.style.display = 'block';

                        document.getElementById('imageSize').textContent = `${width} x ${height}`;
                        document.getElementById('imageFormat').textContent = file.type.split('/')[1].toUpperCase();

                        enableButtons();
                    };
                    img.onerror = () => {
                        console.error('Failed to load image from base64');
                        alert('图片显示失败');
                    };
                    img.src = base64;
                }
            } catch (error) {
                console.error('Failed to load image:', error);
                alert('图片加载失败');
            }
            showLoading(false);
        }

        // 应用滤镜
        window.applyFilter = function(filterType) {
            if (!processor) return;
            showLoading(true);
            try {
                switch (filterType) {
                    case 'grayscale':
                        processor.apply_grayscale();
                        break;
                    case 'sepia':
                        processor.apply_sepia();
                        break;
                    case 'invert':
                        processor.apply_invert();
                        break;
                }
                updateCanvas();
            } catch (error) {
                console.error('Filter error:', error);
            }
            showLoading(false);
        };

        // 二值化
        window.applyThreshold = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.apply_threshold(128);
                updateCanvas();
            } catch (error) {
                console.error('Threshold error:', error);
            }
            showLoading(false);
        };

        // 应用预设滤镜
        window.applyPresetFilter = function(filterName) {
            if (!processor) return;
            showLoading(true);
            try {
                processor.apply_preset_filter(filterName);
                updateCanvas();
            } catch (error) {
                console.error('Preset filter error:', error);
            }
            showLoading(false);
        };

        // 特殊效果
        window.applyPixelate = function() {
            if (!processor) return;
            const pixelSize = prompt('请输入像素大小 (建议 5-20):', '10');
            if (pixelSize && !isNaN(pixelSize)) {
                showLoading(true);
                try {
                    processor.apply_pixelate(parseInt(pixelSize));
                    updateCanvas();
                } catch (error) {
                    console.error('Pixelate error:', error);
                }
                showLoading(false);
            }
        };

        window.applyHalftone = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.apply_halftone();
                updateCanvas();
            } catch (error) {
                console.error('Halftone error:', error);
            }
            showLoading(false);
        };

        window.applySolarize = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.apply_solarize();
                updateCanvas();
            } catch (error) {
                console.error('Solarize error:', error);
            }
            showLoading(false);
        };

        window.applyDither = function() {
            if (!processor) return;
            const depth = prompt('请输入色深 (建议 8-64):', '16');
            if (depth && !isNaN(depth)) {
                showLoading(true);
                try {
                    processor.apply_dither(parseInt(depth));
                    updateCanvas();
                } catch (error) {
                    console.error('Dither error:', error);
                }
                showLoading(false);
            }
        };

        window.applyOil = function() {
            if (!processor) return;
            const radius = prompt('请输入半径 (建议 1-5):', '3');
            const intensity = prompt('请输入强度 (0.0-1.0):', '0.5');
            if (radius && intensity && !isNaN(radius) && !isNaN(intensity)) {
                showLoading(true);
                try {
                    processor.apply_oil(parseInt(radius), parseFloat(intensity));
                    updateCanvas();
                } catch (error) {
                    console.error('Oil error:', error);
                }
                showLoading(false);
            }
        };

        window.applyDuotone = function() {
            if (!processor) return;
            const color1 = prompt('请输入第一种颜色 (R,G,B，如: 255,0,0):', '100,100,200');
            const color2 = prompt('请输入第二种颜色 (R,G,B，如: 0,255,0):', '200,100,100');
            if (color1 && color2) {
                const c1 = color1.split(',').map(Number);
                const c2 = color2.split(',').map(Number);
                if (c1.length === 3 && c2.length === 3) {
                    showLoading(true);
                    try {
                        processor.apply_duotone(c1[0], c1[1], c1[2], c2[0], c2[1], c2[2]);
                        updateCanvas();
                    } catch (error) {
                        console.error('Duotone error:', error);
                    }
                    showLoading(false);
                }
            }
        };

        // 应用无级调节
        window.applyAdjustments = function() {
            if (!processor) return;

            // 获取滑块值
            const brightness = parseInt(document.getElementById('brightnessSlider').value);
            const contrast = parseFloat(document.getElementById('contrastSlider').value);
            const saturation = parseFloat(document.getElementById('saturationSlider').value);
            const hue = parseInt(document.getElementById('hueSlider').value);

            // 更新显示值
            document.getElementById('brightnessValue').textContent = brightness;
            document.getElementById('contrastValue').textContent = contrast;
            document.getElementById('saturationValue').textContent = saturation;
            document.getElementById('hueValue').textContent = hue;

            // 应用调整
            try {
                // 使用批量应用方法，避免重复重置
                processor.apply_all_adjustments(brightness, contrast, saturation, hue);
                updateCanvas();
            } catch (error) {
                console.error('Adjustments error:', error);
            }
        };

        // 旋转图片
        window.rotateImage = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.rotate_90();
                updateCanvas();
            } catch (error) {
                console.error('Rotate error:', error);
            }
            showLoading(false);
        };

        // 水平翻转
        window.flipHorizontal = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.flip_horizontal();
                updateCanvas();
            } catch (error) {
                console.error('Flip horizontal error:', error);
            }
            showLoading(false);
        };

        // 垂直翻转
        window.flipVertical = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.flip_vertical();
                updateCanvas();
            } catch (error) {
                console.error('Flip vertical error:', error);
            }
            showLoading(false);
        };

        // 缩放图片
        window.resizeImage = function() {
            if (!processor) return;
            const width = prompt('请输入新宽度:', processor.get_width() / 2);
            const height = prompt('请输入新高度:', processor.get_height() / 2);
            if (width && height && !isNaN(width) && !isNaN(height)) {
                showLoading(true);
                try {
                    processor.resize(parseInt(width), parseInt(height));
                    updateCanvas();
                } catch (error) {
                    console.error('Resize error:', error);
                }
                showLoading(false);
            }
        };

        // 裁剪图片
        window.cropImage = function() {
            if (!processor) return;
            const currentWidth = processor.get_width();
            const currentHeight = processor.get_height();
            const x1 = prompt(`请输入起始 X (0 - ${currentWidth}):`, '0');
            const y1 = prompt(`请输入起始 Y (0 - ${currentHeight}):`, '0');
            const x2 = prompt(`请输入结束 X (1 - ${currentWidth}):`, Math.floor(currentWidth / 2));
            const y2 = prompt(`请输入结束 Y (1 - ${currentHeight}):`, Math.floor(currentHeight / 2));
            if (x1 && y1 && x2 && y2 && !isNaN(x1) && !isNaN(y1) && !isNaN(x2) && !isNaN(y2)) {
                showLoading(true);
                try {
                    processor.crop(parseInt(x1), parseInt(y1), parseInt(x2), parseInt(y2));
                    updateCanvas();
                } catch (error) {
                    console.error('Crop error:', error);
                }
                showLoading(false);
            }
        };

        // 格式转换
        window.convertFormat = function(format) {
            if (!processor) return;
            showLoading(true);
            try {
                const base64 = format === 'png' ? processor.to_png() : processor.to_jpeg(90);
                const link = document.createElement('a');
                link.download = `image.${format}`;
                link.href = `data:image/${format};base64,${base64}`;
                link.click();
            } catch (error) {
                console.error('Convert error:', error);
            }
            showLoading(false);
        };

        // 重置图片
        window.resetImage = function() {
            if (!processor) return;

            // 重置 WebAssembly 处理器
            processor.reset();

            // 重置滑块
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('contrastSlider').value = 100;
            document.getElementById('saturationSlider').value = 100;
            document.getElementById('hueSlider').value = 0;

            // 重置显示值
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';
            document.getElementById('hueValue').textContent = '0';

            // 更新画布
            updateCanvas();
        };

        // 清空图像
        window.clearImage = function() {
            if (!currentImage) return;

            // 清空处理器
            processor = null;
            currentImage = null;
            originalImageData = null;

            // 清空画布
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.style.display = 'none';

            // 显示空状态
            document.getElementById('emptyState').style.display = 'block';

            // 重置信息面板
            document.getElementById('imageSize').textContent = '未加载';
            document.getElementById('imageFormat').textContent = '-';

            // 重置滑块
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('contrastSlider').value = 100;
            document.getElementById('saturationSlider').value = 100;
            document.getElementById('hueSlider').value = 0;

            // 重置显示值
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';
            document.getElementById('hueValue').textContent = '0';

            // 禁用所有按钮
            enableButtons();
        };

        // 下载图片
        window.downloadImage = function() {
            const canvas = document.getElementById('imageCanvas');
            const link = document.createElement('a');
            link.download = 'edited_image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        // 更新画布
        function updateCanvas() {
            if (!processor) return;
            const width = processor.get_width();
            const height = processor.get_height();

            // 使用 get_base64() 获取图像数据并绘制到 Canvas
            const base64 = processor.to_base64();

            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');

            // 创建图像对象
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
            };
            img.src = base64;
        }

        // 初始化
        initWasm();
    </script>
</body>
</html>
