<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAssembly 图像处理器</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #2c2c2c;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .main-content {
            display: flex;
            flex: 1;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar-toggle {
            position: fixed;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #444;
            color: white;
            border: none;
            padding: 15px 8px;
            cursor: pointer;
            z-index: 1000;
            border-radius: 0 5px 5px 0;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .sidebar-toggle:hover {
            background: #555;
        }

        .sidebar {
            width: 320px;
            background: #333;
            padding: 20px;
            border-right: 1px solid #444;
            overflow-y: auto;
            overflow-x: hidden;
            transition: margin-left 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: #555 #333;
        }

        .sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #333;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        .sidebar.hidden {
            margin-left: -320px;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            overflow: hidden;
            padding: 0;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h3 {
            color: #e0e0e0;
            margin-bottom: 12px;
            font-size: 1.1em;
            border-bottom: 2px solid #555;
            padding-bottom: 5px;
        }

        .upload-area {
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
        }

        .upload-area:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .upload-area.dragover {
            background: rgba(255, 255, 255, 0.1);
        }

        .upload-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            color: #888;
        }

        .upload-text {
            color: #aaa;
            font-weight: 600;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #444;
            color: #e0e0e0;
        }

        .btn:hover {
            background: #555;
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #2a2a2a;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: #8b3a3a;
        }

        .btn-danger:hover {
            background: #a04a4a;
        }

        .btn-success {
            background: #3a8b5a;
        }

        .btn-success:hover {
            background: #4aaa6b;
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #imageCanvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .info-panel {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a2a;
            border-radius: 8px;
            font-size: 0.9em;
            color: #e0e0e0;
        }

        .info-panel p {
            margin: 5px 0;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slider-container {
            margin: 10px 0;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #e0e0e0;
        }

        .slider-container input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .slider-value {
            text-align: right;
            font-size: 0.85em;
            color: #aaa;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #888;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .empty-state:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .empty-state.dragover {
            background: rgba(255, 255, 255, 0.1);
        }

        .empty-state .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            color: #666;
        }

        /* 裁剪框样式 */
        .crop-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .crop-box {
            position: absolute;
            border: 2px solid #fff;
            background: rgba(0, 0, 0, 0.3);
            cursor: move;
        }

        .crop-handle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #fff;
            border: 2px solid #333;
            pointer-events: auto;
        }

        .crop-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
        .crop-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
        .crop-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
        .crop-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
        .crop-handle.n { top: -6px; left: 50%; transform: translateX(-50%); cursor: n-resize; }
        .crop-handle.s { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: s-resize; }
        .crop-handle.w { top: 50%; left: -6px; transform: translateY(-50%); cursor: w-resize; }
        .crop-handle.e { top: 50%; right: -6px; transform: translateY(-50%); cursor: e-resize; }

        .crop-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .crop-controls .btn {
            min-width: 80px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>

    <div class="main-content">
            <div class="sidebar">
                <div class="section">
                    <h3>基础滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyFilter('grayscale')" disabled>灰度</button>
                        <button class="btn" onclick="applyFilter('sepia')" disabled>复古</button>
                        <button class="btn" onclick="applyFilter('invert')" disabled>反色</button>
                        <button class="btn" onclick="applyThreshold()" disabled>二值化</button>
                    </div>
                </div>

                <div class="section">
                    <h3>预设滤镜</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPresetFilter('oceanic')" disabled>海洋</button>
                        <button class="btn" onclick="applyPresetFilter('lofi')" disabled>复古风</button>
                        <button class="btn" onclick="applyPresetFilter('vintage')" disabled>怀旧</button>
                        <button class="btn" onclick="applyPresetFilter('dramatic')" disabled>戏剧</button>
                        <button class="btn" onclick="applyPresetFilter('pastel_pink')" disabled>粉红</button>
                        <button class="btn" onclick="applyPresetFilter('cali')" disabled>加州</button>
                        <button class="btn" onclick="applyPresetFilter('firenze')" disabled>佛罗伦萨</button>
                        <button class="btn" onclick="applyPresetFilter('obsidian')" disabled>黑曜</button>
                    </div>
                </div>

                <div class="section">
                    <h3>特殊效果</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyPixelate()" disabled>像素化</button>
                        <button class="btn" onclick="applyHalftone()" disabled>半色调</button>
                        <button class="btn" onclick="applySolarize()" disabled>曝光</button>
                        <button class="btn" onclick="applyDither()" disabled>抖动</button>
                        <button class="btn" onclick="applyOil()" disabled>油画</button>
                        <button class="btn" onclick="applyDuotone()" disabled>双色</button>
                    </div>
                </div>

                <div class="section">
                    <h3>无级调节</h3>
                    <div class="slider-container">
                        <label>亮度 (-100 ~ 100)</label>
                        <input type="range" id="brightnessSlider" min="-100" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="brightnessValue">0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>对比度 (0 ~ 200)</label>
                        <input type="range" id="contrastSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="contrastValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>饱和度 (0 ~ 200)</label>
                        <input type="range" id="saturationSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="saturationValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>色相 (-180 ~ 180)</label>
                        <input type="range" id="hueSlider" min="-180" max="180" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="hueValue">0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>明度与伽马</h3>
                    <div class="slider-container">
                        <label>明度 (0 ~ 200)</label>
                        <input type="range" id="lightnessSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="lightnessValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>色彩空间</label>
                        <select id="colorSpaceSelect" onchange="applyAdjustments()" disabled style="width: 100%; padding: 8px; background: #444; color: #e0e0e0; border: 1px solid #555; border-radius: 6px;">
                            <option value="hsl">HSL (默认)</option>
                            <option value="lch">LCh</option>
                            <option value="hsv">HSV</option>
                            <option value="hsluv">HSLuv</option>
                            <option value="auto">智能识别</option>
                        </select>
                    </div>
                    <div class="slider-container">
                        <label>伽马 R (0.1 ~ 10)</label>
                        <input type="range" id="gammaRedSlider" min="1" max="100" value="10" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="gammaRedValue">1.0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>伽马 G (0.1 ~ 10)</label>
                        <input type="range" id="gammaGreenSlider" min="1" max="100" value="10" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="gammaGreenValue">1.0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>伽马 B (0.1 ~ 10)</label>
                        <input type="range" id="gammaBlueSlider" min="1" max="100" value="10" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="gammaBlueValue">1.0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>锐化</h3>
                    <div class="slider-container">
                        <label>锐度 (0 ~ 10)</label>
                        <input type="range" id="sharpenSlider" min="0" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="sharpenValue">0.0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>变换操作</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="rotateImage()" disabled>旋转 90°</button>
                        <button class="btn" onclick="flipHorizontal()" disabled>水平翻转</button>
                        <button class="btn" onclick="flipVertical()" disabled>垂直翻转</button>
                        <button class="btn" onclick="resizeImage()" disabled>缩放</button>
                        <button class="btn" onclick="cropImage()" disabled>裁剪</button>
                    </div>
                </div>

                <div class="section">
                    <h3>格式转换</h3>
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="convertFormat('png')" disabled>转 PNG</button>
                        <button class="btn btn-success" onclick="convertFormat('jpeg')" disabled>转 JPEG</button>
                    </div>
                </div>

                <div class="section">
                    <h3>操作</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="undo()" disabled id="undoBtn">↩ 撤销</button>
                        <button class="btn" onclick="redo()" disabled id="redoBtn">↪ 重做</button>
                        <button class="btn" onclick="resetImage()" disabled>重置</button>
                        <button class="btn btn-danger" onclick="clearImage()" disabled>清空图像</button>
                        <button class="btn btn-danger" onclick="downloadImage()" disabled>下载</button>
                    </div>
                </div>

                <div class="info-panel" id="infoPanel">
                    <p>尺寸: <span id="imageSize">未加载</span></p>
                    <p>格式: <span id="imageFormat">-</span></p>
                </div>
            </div>

            <div class="editor-area">
                <div class="canvas-container" id="canvasContainer">
                    <div class="empty-state" id="emptyState">
                        <svg class="icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>请上传图片开始编辑</p>
                        <p style="font-size: 0.9em; color: #666; margin-top: 10px;">点击或拖拽上传</p>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    </div>
                    <canvas id="imageCanvas" style="display: none;"></canvas>
                    <canvas id="cropOverlay" class="crop-overlay" style="display: none;"></canvas>
                    <div class="crop-controls" id="cropControls" style="display: none;">
                        <button class="btn btn-success" onclick="applyCrop()">✓ 确认裁剪</button>
                        <button class="btn btn-danger" onclick="cancelCrop()">✕ 取消</button>
                    </div>
                </div>
            </div>
    </div>

    <script type="module">
        import init, { ImageProcessor } from './photon-wasm/pkg/photon_wasm.js';

        let wasmModule = null;
        let processor = null;
        let originalImageData = null;
        let currentImage = null;
        
        // 历史记录管理
        let historyStack = [];
        let redoStack = [];
        const MAX_HISTORY = 30;

        // 保存当前状态到历史记录
        function saveToHistory() {
            if (!processor) return;
            
            const state = {
                base64: processor.to_base64(),
                width: processor.get_width(),
                height: processor.get_height()
            };
            
            historyStack.push(state);
            if (historyStack.length > MAX_HISTORY) {
                historyStack.shift();
            }
            
            // 清空重做栈
            redoStack = [];
            
            updateUndoRedoButtons();
        }

        // 撤销
        window.undo = function() {
            if (historyStack.length === 0) return;
            
            // 保存当前状态到重做栈
            redoStack.push({
                base64: processor.to_base64(),
                width: processor.get_width(),
                height: processor.get_height()
            });
            
            // 恢复上一个状态
            const state = historyStack.pop();
            restoreState(state);
            
            updateUndoRedoButtons();
        }

        // 重做
        window.redo = function() {
            if (redoStack.length === 0) return;
            
            // 保存当前状态到历史栈
            historyStack.push({
                base64: processor.to_base64(),
                width: processor.get_width(),
                height: processor.get_height()
            });
            
            // 恢复重做状态
            const state = redoStack.pop();
            restoreState(state);
            
            updateUndoRedoButtons();
        }

        // 恢复状态
        function restoreState(state) {
            // 提取纯 base64 数据（移除可能的 data URI 前缀）
            const base64Data = state.base64.includes(',') ? state.base64.split(',')[1] : state.base64;
            const uint8Array = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
            processor = ImageProcessor.new_from_bytes(uint8Array);
            updateCanvas();
        }

        // 更新撤销/重做按钮状态
        function updateUndoRedoButtons() {
            document.getElementById('undoBtn').disabled = historyStack.length === 0;
            document.getElementById('redoBtn').disabled = redoStack.length === 0;
        }

        // 初始化 WASM 模块
        async function initWasm() {
            showLoading(true);
            try {
                wasmModule = await init();
                console.log('WebAssembly module loaded successfully');
                enableButtons();
            } catch (error) {
                console.error('Failed to load WebAssembly:', error);
                alert('WebAssembly 模块加载失败，请确保服务器支持 WASM');
            }
            showLoading(false);
        }

        // 显示/隐藏加载动画
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        // 启用按钮
        function enableButtons() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                // 下载和清空图像按钮需要 currentImage
                if (btn.getAttribute('onclick')?.includes('downloadImage') || 
                    btn.getAttribute('onclick')?.includes('clearImage')) {
                    btn.disabled = !currentImage;
                }
                // 其他非危险按钮
                else if (!btn.classList.contains('btn-danger')) {
                    btn.disabled = !currentImage;
                }
            });

            // 启用滑块
            const sliders = document.querySelectorAll('input[type="range"]');
            sliders.forEach(slider => {
                slider.disabled = !currentImage;
            });

            // 启用选择器
            const selects = document.querySelectorAll('select');
            selects.forEach(select => {
                select.disabled = !currentImage;
            });
        }

        // 切换侧边栏
        window.toggleSidebar = function() {
            const sidebar = document.querySelector('.sidebar');
            const toggle = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('hidden');
            if (sidebar.classList.contains('hidden')) {
                toggle.textContent = '▶';
                toggle.style.left = '0';
            } else {
                toggle.textContent = '☰';
                toggle.style.left = '320px';
            }
        }

        // 文件上传处理
        const emptyState = document.getElementById('emptyState');
        const editorArea = document.querySelector('.editor-area');

        // 点击整个编辑区域触发上传（仅在没有图片时）
        editorArea.addEventListener('click', (e) => {
            if (!currentImage && !e.target.closest('.sidebar')) {
                document.getElementById('fileInput').click();
            }
        });

        // 整个编辑区域支持拖拽
        editorArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (!currentImage) {
                emptyState.classList.add('dragover');
            }
        });

        editorArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            emptyState.classList.remove('dragover');
        });

        editorArea.addEventListener('drop', (e) => {
            e.preventDefault();
            emptyState.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // 加载图片
        async function loadImage(file) {
            showLoading(true);
            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                if (wasmModule) {
                    processor = ImageProcessor.new_from_bytes(uint8Array);
                    const width = processor.get_width();
                    const height = processor.get_height();

                    // 保存原始处理器用于无级调节
                    originalProcessor = ImageProcessor.new_from_bytes(uint8Array);

                    // 使用 get_base64() 获取图像数据并绘制到 Canvas
                    const base64 = processor.to_base64();

                    const canvas = document.getElementById('imageCanvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    // 创建图像对象
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0);
                        // 保存原始图像数据
                        originalImageData = ctx.getImageData(0, 0, width, height);
                        currentImage = {
                            data: new Uint8ClampedArray(originalImageData.data),
                            width,
                            height
                        };

                        document.getElementById('emptyState').style.display = 'none';
                        canvas.style.display = 'block';

                        document.getElementById('imageSize').textContent = `${width} x ${height}`;
                        document.getElementById('imageFormat').textContent = file.type.split('/')[1].toUpperCase();

                        enableButtons();
                    };
                    img.onerror = () => {
                        console.error('Failed to load image from base64');
                        alert('图片显示失败');
                    };
                    img.src = base64;
                }
            } catch (error) {
                console.error('Failed to load image:', error);
                alert('图片加载失败');
            }
            showLoading(false);
        }

        // 应用滤镜
        window.applyFilter = function(filterType) {
            if (!processor) return;
            showLoading(true);
            // 保存状态到历史记录
            saveToHistory();
            try {
                switch (filterType) {
                    case 'grayscale':
                        processor.apply_grayscale();
                        break;
                    case 'sepia':
                        processor.apply_sepia();
                        break;
                    case 'invert':
                        processor.apply_invert();
                        break;
                }
                updateCanvas();
            } catch (error) {

        // 应用无级调节
        let adjustmentTimeout = null;
        let originalProcessor = null; // 保存原始处理器用于无级调节
        window.applyAdjustments = function() {
            if (!processor) return;

            // 获取滑块值
            const brightness = parseInt(document.getElementById('brightnessSlider').value);
            const contrast = parseFloat(document.getElementById('contrastSlider').value);
            const saturation = parseFloat(document.getElementById('saturationSlider').value);
            const hue = parseInt(document.getElementById('hueSlider').value);
            const lightness = parseFloat(document.getElementById('lightnessSlider').value);
            const colorSpace = document.getElementById('colorSpaceSelect').value;
            const gammaRed = parseFloat(document.getElementById('gammaRedSlider').value) / 10;
            const gammaGreen = parseFloat(document.getElementById('gammaGreenSlider').value) / 10;
            const gammaBlue = parseFloat(document.getElementById('gammaBlueSlider').value) / 10;
            const sharpenStrength = parseFloat(document.getElementById('sharpenSlider').value) / 10;

            // 更新显示值
            document.getElementById('brightnessValue').textContent = brightness;
            document.getElementById('contrastValue').textContent = contrast;
            document.getElementById('saturationValue').textContent = saturation;
            document.getElementById('hueValue').textContent = hue;
            document.getElementById('lightnessValue').textContent = lightness;
            document.getElementById('gammaRedValue').textContent = gammaRed.toFixed(1);
            document.getElementById('gammaGreenValue').textContent = gammaGreen.toFixed(1);
            document.getElementById('gammaBlueValue').textContent = gammaBlue.toFixed(1);
            document.getElementById('sharpenValue').textContent = sharpenStrength.toFixed(1);

            // 应用调整
            try {
                // 基于原始图像应用所有调整
                if (originalProcessor) {
                    // 创建新的处理器实例（基于原始图像）
                    const base64 = originalProcessor.to_base64();
                    const base64Data = base64.includes(',') ? base64.split(',')[1] : base64;
                    const uint8Array = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                    processor = ImageProcessor.new_from_bytes(uint8Array);
                    
                    // 应用亮度 (-255 到 255)
                    const adjustedBrightness = Math.max(-255, Math.min(255, brightness));
                    if (adjustedBrightness !== 0) {
                        processor.apply_brightness(adjustedBrightness);
                    }
                    
                    // 应用对比度 (-255 到 255，从 0-200 转换)
                    const adjustedContrast = (contrast - 100) * 2.55; // 转换为 -255 到 255
                    const clampedContrast = Math.max(-255, Math.min(255, adjustedContrast));
                    if (clampedContrast !== 0) {
                        processor.apply_contrast(clampedContrast);
                    }
                    
                    // 应用饱和度 (-1 到 1，从 0-200 转换)
                    const adjustedSaturation = (saturation - 100) / 100; // 转换为 -1 到 1
                    const clampedSaturation = Math.max(-1, Math.min(1, adjustedSaturation));
                    if (clampedSaturation !== 0) {
                        processor.apply_saturation(clampedSaturation);
                    }
                    
                    // 应用色相 (-360 到 360)
                    const adjustedHue = Math.max(-360, Math.min(360, hue));
                    if (adjustedHue !== 0) {
                        processor.apply_hue(adjustedHue);
                    }

                    // 应用明度 (-1 到 1，从 0-200 转换)
                    const adjustedLightness = (lightness - 100) / 100; // 转换为 -1 到 1
                    const clampedLightness = Math.max(-1, Math.min(1, adjustedLightness));
                    if (clampedLightness !== 0) {
                        // 智能识别色彩空间
                        let selectedColorSpace = colorSpace;
                        if (colorSpace === 'auto') {
                            // 根据图像特征自动选择色彩空间
                            selectedColorSpace = autoDetectColorSpace();
                        }
                        processor.apply_lightness(clampedLightness, selectedColorSpace);
                    }

                    // 应用伽马校正 (0.1 到 10)
                    if (gammaRed !== 1.0 || gammaGreen !== 1.0 || gammaBlue !== 1.0) {
                        processor.apply_gamma(gammaRed, gammaGreen, gammaBlue);
                    }

                    // 应用锐化 (0.0 到 10.0)
                    if (sharpenStrength !== 0.0) {
                        processor.apply_sharpen(sharpenStrength);
                    }
                }
                
                updateCanvas();
                
                // 防抖动保存历史记录（用户停止调节 500ms 后保存）
                clearTimeout(adjustmentTimeout);
                adjustmentTimeout = setTimeout(() => {
                    saveToHistory();
                }, 500);
            } catch (error) {
                console.error('Adjustments error:', error);
            }
        };

        // 智能检测最佳色彩空间
        function autoDetectColorSpace() {
            // 简单的启发式规则：
            // - 对于大多数照片，HSL 通常是最佳选择
            // - 对于需要感知均匀性的场景，LCh 更好
            // - HSV 适用于饱和度优先的场景
            // - HSLuv 适用于需要色彩均匀性的场景
            
            // 这里使用 HSL 作为默认选择，因为它是应用最广泛的
            return 'hsl';
        }

        // 裁剪模式
        let isCropMode = false;

        let isDragging = false;

        let resizeHandle = null;
        let dragStart = { x: 0, y: 0 };
        let initialCropBox = { x: 0, y: 0, width: 0, height: 0 };

        // 进入裁剪模式
        window.cropImage = function() {
            if (!processor) return;
            isCropMode = true;
            
            // 初始化裁剪框为图像中心的一半大小
            const canvas = document.getElementById('imageCanvas');
            const width = canvas.width;

            cropBox = {
                x: width * 0.25,

            };
            
            // 显示裁剪覆盖层

            drawCropOverlay();
            
            // 添加事件监听

        // 设置裁剪事件监听
        function setupCropEvents() {
            const cropOverlay = document.getElementById('cropOverlay');
            const canvas = document.getElementById('imageCanvas');
            
            // 移除旧的事件监听器（通过克隆节点）
            const newCropOverlay = cropOverlay.cloneNode(true);
            cropOverlay.parentNode.replaceChild(newCropOverlay, cropOverlay);
            
            // 更新引用
            const updatedCropOverlay = document.getElementById('cropOverlay');
            
            // 鼠标按下
            updatedCropOverlay.addEventListener('mousedown', (e) => {
                const rect = updatedCropOverlay.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                // 检查是否点击了裁剪框
                if (mouseX >= cropBox.x && mouseX <= cropBox.x + cropBox.width &&
                    mouseY >= cropBox.y && mouseY <= cropBox.y + cropBox.height) {
                    
                    // 检查是否点击了调整手柄
                    const handleSize = 10;
                    if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'nw';
                    } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'ne';
                    } else if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'sw';
                    } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                        isResizing = true;
                        resizeHandle = 'se';
                    } else {
                        isDragging = true;
                    }
                    
                    dragStart = { x: mouseX, y: mouseY };
                    initialCropBox = { ...cropBox };
                    e.preventDefault();
                }
            });

            // 鼠标移动
            updatedCropOverlay.addEventListener('mousemove', (e) => {
                if (!isCropMode) return;
                
                const rect = updatedCropOverlay.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const dx = mouseX - dragStart.x;
                const dy = mouseY - dragStart.y;
                
                // 更新光标样式
                updateCursor(mouseX, mouseY, rect);
                
                if (isDragging) {
                    cropBox.x = Math.max(0, Math.min(canvas.width - cropBox.width, initialCropBox.x + dx));
                    cropBox.y = Math.max(0, Math.min(canvas.height - cropBox.height, initialCropBox.y + dy));
                    drawCropOverlay();
                } else if (isResizing) {
                    handleResize(dx, dy);
                    drawCropOverlay();
                }
            });

            // 鼠标释放
            updatedCropOverlay.addEventListener('mouseup', () => {
                isDragging = false;
                isResizing = false;
                resizeHandle = null;
            });
            
            // 鼠标离开
            updatedCropOverlay.addEventListener('mouseleave', () => {
                isDragging = false;
                isResizing = false;
                resizeHandle = null;
            });
        }

        // 更新光标样式
        function updateCursor(mouseX, mouseY, rect) {
            const canvas = document.getElementById('imageCanvas');
            const handleSize = 10;
            
            if (mouseX >= cropBox.x && mouseX <= cropBox.x + cropBox.width &&
                mouseY >= cropBox.y && mouseY <= cropBox.y + cropBox.height) {
                if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                    canvas.style.cursor = 'nw-resize';
                } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - cropBox.y) < handleSize) {
                    canvas.style.cursor = 'ne-resize';
                } else if (Math.abs(mouseX - cropBox.x) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                    canvas.style.cursor = 'sw-resize';
                } else if (Math.abs(mouseX - (cropBox.x + cropBox.width)) < handleSize && Math.abs(mouseY - (cropBox.y + cropBox.height)) < handleSize) {
                    canvas.style.cursor = 'se-resize';
                } else {
                    canvas.style.cursor = 'move';
                }
            } else {
                canvas.style.cursor = 'default';
            }
        }

        // 处理调整大小
        function handleResize(dx, dy) {
            const canvas = document.getElementById('imageCanvas');
            const minSize = 20;
            
            switch (resizeHandle) {
                case 'nw':
                    cropBox.x = Math.max(0, initialCropBox.x + dx);
                    cropBox.y = Math.max(0, initialCropBox.y + dy);
                    cropBox.width = Math.max(minSize, initialCropBox.width - dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height - dy);
                    break;
                case 'ne':
                    cropBox.y = Math.max(0, initialCropBox.y + dy);
                    cropBox.width = Math.max(minSize, initialCropBox.width + dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height - dy);
                    break;
                case 'sw':
                    cropBox.x = Math.max(0, initialCropBox.x + dx);
                    cropBox.width = Math.max(minSize, initialCropBox.width - dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height + dy);
                    break;
                case 'se':
                    cropBox.width = Math.max(minSize, initialCropBox.width + dx);
                    cropBox.height = Math.max(minSize, initialCropBox.height + dy);
                    break;
            }
            
            // 确保裁剪框在画布内
            cropBox.x = Math.max(0, Math.min(canvas.width - cropBox.width, cropBox.x));
            cropBox.y = Math.max(0, Math.min(canvas.height - cropBox.height, cropBox.y));
        }

        // 绘制裁剪覆盖层
        function drawCropOverlay() {
            const cropOverlay = document.getElementById('cropOverlay');
            const ctx = cropOverlay.getContext('2d');
            
            // 清空覆盖层
            ctx.clearRect(0, 0, cropOverlay.width, cropOverlay.height);
            
            // 绘制半透明遮罩
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, cropOverlay.width, cropOverlay.height);
            
            // 清除裁剪框区域的遮罩
            ctx.clearRect(cropBox.x, cropBox.y, cropBox.width, cropBox.height);
            
            // 绘制裁剪框边框
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.strokeRect(cropBox.x, cropBox.y, cropBox.width, cropBox.height);
            ctx.setLineDash([]);
            
            // 绘制三分线
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            
            // 垂直线
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(cropBox.x + (cropBox.width / 3) * i, cropBox.y);
                ctx.lineTo(cropBox.x + (cropBox.width / 3) * i, cropBox.y + cropBox.height);
                ctx.stroke();
            }
            
            // 水平线
            for (let i = 1; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(cropBox.x, cropBox.y + (cropBox.height / 3) * i);
                ctx.lineTo(cropBox.x + cropBox.width, cropBox.y + (cropBox.height / 3) * i);
                ctx.stroke();
            }
            
            // 绘制调整手柄
            const handleSize = 8;
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            
            // 四角
            ctx.fillRect(cropBox.x - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            
            ctx.fillRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y - handleSize/2, handleSize, handleSize);
            
            ctx.fillRect(cropBox.x - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
            
            ctx.fillRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
            ctx.strokeRect(cropBox.x + cropBox.width - handleSize/2, cropBox.y + cropBox.height - handleSize/2, handleSize, handleSize);
        }

            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';
            document.getElementById('hueValue').textContent = '0';
            document.getElementById('lightnessValue').textContent = '100';
            document.getElementById('gammaRedValue').textContent = '1.0';
            document.getElementById('gammaGreenValue').textContent = '1.0';
            document.getElementById('gammaBlueValue').textContent = '1.0';
            document.getElementById('sharpenValue').textContent = '0.0';

            // 禁用所有按钮
            enableButtons();
        };

        // 下载图片
        window.downloadImage = function() {
            const canvas = document.getElementById('imageCanvas');
            const link = document.createElement('a');
            link.download = 'edited_image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        // 更新画布
        function updateCanvas() {
            if (!processor) return;
            const width = processor.get_width();
            const height = processor.get_height();

            // 使用 get_base64() 获取图像数据并绘制到 Canvas
            const base64 = processor.to_base64();

            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');

            // 更新画布尺寸
            canvas.width = width;
            canvas.height = height;

            // 创建图像对象
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
            };
            img.src = base64;
        }

        // 初始化
        initWasm();
    </script>
</body>
</html>
