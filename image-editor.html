<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAssembly 图像处理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: flex;
            min-height: 600px;
        }

        .sidebar {
            width: 300px;
            background: #f8f9fa;
            padding: 20px;
            border-right: 1px solid #dee2e6;
        }

        .editor-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h3 {
            color: #495057;
            margin-bottom: 12px;
            font-size: 1.1em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .upload-area:hover {
            background: #f0f4ff;
            border-color: #764ba2;
        }

        .upload-area.dragover {
            background: #e0e7ff;
            border-color: #667eea;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #667eea;
            font-weight: 600;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .canvas-container {
            position: relative;
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #imageCanvas {
            display: block;
            max-width: 100%;
            max-height: 500px;
        }

        .info-panel {
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9em;
            color: #495057;
        }

        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .slider-container {
            margin: 10px 0;
        }

        .slider-container label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85em;
            color: #495057;
        }

        .slider-container input[type="range"] {
            width: 100%;
            margin-bottom: 5px;
        }

        .slider-value {
            text-align: right;
            font-size: 0.85em;
            color: #667eea;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            padding: 50px;
        }

        .empty-state .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1>🎨 WebAssembly 图像处理器</h1>
            <p>使用 Rust 和 Photon-rs 构建的高性能图像处理工具</p>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="section">
                    <h3>📤 上传图片</h3>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📁</div>
                        <div class="upload-text">点击或拖拽上传</div>
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="section">
                    <h3>🎭 滤镜效果</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="applyFilter('grayscale')" disabled>灰度</button>
                        <button class="btn" onclick="applyFilter('sepia')" disabled>复古</button>
                        <button class="btn" onclick="applyFilter('invert')" disabled>反色</button>
                        <button class="btn" onclick="applyThreshold()" disabled>二值化</button>
                    </div>
                </div>

                <div class="section">
                    <h3>🎨 无级调节</h3>
                    <div class="slider-container">
                        <label>亮度 (-100 ~ 100)</label>
                        <input type="range" id="brightnessSlider" min="-100" max="100" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="brightnessValue">0</span></div>
                    </div>
                    <div class="slider-container">
                        <label>对比度 (0 ~ 200)</label>
                        <input type="range" id="contrastSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="contrastValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>饱和度 (0 ~ 200)</label>
                        <input type="range" id="saturationSlider" min="0" max="200" value="100" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="saturationValue">100</span></div>
                    </div>
                    <div class="slider-container">
                        <label>色相 (-180 ~ 180)</label>
                        <input type="range" id="hueSlider" min="-180" max="180" value="0" oninput="applyAdjustments()" disabled>
                        <div class="slider-value"><span id="hueValue">0</span></div>
                    </div>
                </div>

                <div class="section">
                    <h3>🔄 变换操作</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="rotateImage()" disabled>旋转 90°</button>
                        <button class="btn" onclick="flipImage()" disabled>水平翻转</button>
                        <button class="btn" onclick="resizeImage()" disabled>缩放</button>
                    </div>
                </div>

                <div class="section">
                    <h3>💾 格式转换</h3>
                    <div class="btn-group">
                        <button class="btn btn-success" onclick="convertFormat('png')" disabled>转 PNG</button>
                        <button class="btn btn-success" onclick="convertFormat('jpeg')" disabled>转 JPEG</button>
                    </div>
                </div>

                <div class="section">
                    <h3>⚙️ 操作</h3>
                    <div class="btn-group">
                        <button class="btn" onclick="resetImage()" disabled>重置</button>
                        <button class="btn btn-danger" onclick="downloadImage()" disabled>下载</button>
                    </div>
                </div>

                <div class="info-panel" id="infoPanel">
                    <p>📏 尺寸: <span id="imageSize">未加载</span></p>
                    <p>📁 格式: <span id="imageFormat">-</span></p>
                </div>
            </div>

            <div class="editor-area">
                <div class="canvas-container" id="canvasContainer">
                    <div class="empty-state" id="emptyState">
                        <div class="icon">🖼️</div>
                        <p>请上传图片开始编辑</p>
                    </div>
                    <canvas id="imageCanvas" style="display: none;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, { ImageProcessor } from './photon-wasm/pkg/photon_wasm.js';

        let wasmModule = null;
        let processor = null;
        let originalImageData = null;
        let currentImage = null;

        // 初始化 WASM 模块
        async function initWasm() {
            showLoading(true);
            try {
                wasmModule = await init();
                console.log('WebAssembly module loaded successfully');
                enableButtons();
            } catch (error) {
                console.error('Failed to load WebAssembly:', error);
                alert('WebAssembly 模块加载失败，请确保服务器支持 WASM');
            }
            showLoading(false);
        }

        // 显示/隐藏加载动画
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'flex' : 'none';
        }

        // 启用按钮
        function enableButtons() {
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                if (!btn.classList.contains('btn-danger')) {
                    btn.disabled = !currentImage;
                }
            });

            // 启用滑块
            const sliders = document.querySelectorAll('input[type="range"]');
            sliders.forEach(slider => {
                slider.disabled = !currentImage;
            });
        }

        // 文件上传处理
        document.getElementById('uploadArea').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });

        document.getElementById('uploadArea').addEventListener('dragover', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').classList.add('dragover');
        });

        document.getElementById('uploadArea').addEventListener('dragleave', () => {
            document.getElementById('uploadArea').classList.remove('dragover');
        });

        document.getElementById('uploadArea').addEventListener('drop', (e) => {
            e.preventDefault();
            document.getElementById('uploadArea').classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                loadImage(file);
            }
        });

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                loadImage(file);
            }
        });

        // 加载图片
        async function loadImage(file) {
            showLoading(true);
            try {
                const arrayBuffer = await file.arrayBuffer();
                const uint8Array = new Uint8Array(arrayBuffer);

                if (wasmModule) {
                    processor = ImageProcessor.new_from_bytes(uint8Array);
                    const width = processor.get_width();
                    const height = processor.get_height();

                    // 使用 get_base64() 获取图像数据并绘制到 Canvas
                    const base64 = processor.to_base64();

                    const canvas = document.getElementById('imageCanvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');

                    // 创建图像对象
                    const img = new Image();
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0);
                        // 保存原始图像数据
                        originalImageData = ctx.getImageData(0, 0, width, height);
                        currentImage = {
                            data: new Uint8ClampedArray(originalImageData.data),
                            width,
                            height
                        };

                        document.getElementById('emptyState').style.display = 'none';
                        canvas.style.display = 'block';

                        document.getElementById('imageSize').textContent = `${width} x ${height}`;
                        document.getElementById('imageFormat').textContent = file.type.split('/')[1].toUpperCase();

                        enableButtons();
                    };
                    img.onerror = () => {
                        console.error('Failed to load image from base64');
                        alert('图片显示失败');
                    };
                    img.src = `data:image/png;base64,${base64}`;
                }
            } catch (error) {
                console.error('Failed to load image:', error);
                alert('图片加载失败');
            }
            showLoading(false);
        }

        // 应用滤镜
        window.applyFilter = function(filterType) {
            if (!processor) return;
            showLoading(true);
            try {
                switch (filterType) {
                    case 'grayscale':
                        processor.apply_grayscale();
                        break;
                    case 'sepia':
                        processor.apply_sepia();
                        break;
                    case 'invert':
                        processor.apply_invert();
                        break;
                }
                updateCanvas();
            } catch (error) {
                console.error('Filter error:', error);
            }
            showLoading(false);
        };

        // 二值化
        window.applyThreshold = function() {
            if (!processor) return;
            showLoading(true);
            try {
                processor.apply_threshold(128);
                updateCanvas();
            } catch (error) {
                console.error('Threshold error:', error);
            }
            showLoading(false);
        };

        // 应用无级调节
        window.applyAdjustments = function() {
            if (!processor) return;

            // 获取滑块值
            const brightness = parseInt(document.getElementById('brightnessSlider').value);
            const contrast = parseInt(document.getElementById('contrastSlider').value);
            const saturation = parseInt(document.getElementById('saturationSlider').value);
            const hue = parseInt(document.getElementById('hueSlider').value);

            // 更新显示值
            document.getElementById('brightnessValue').textContent = brightness;
            document.getElementById('contrastValue').textContent = contrast;
            document.getElementById('saturationValue').textContent = saturation;
            document.getElementById('hueValue').textContent = hue;

            // 应用调整
            try {
                // 重置到原始图像
                processor.reset();

                // 应用各项调整
                if (brightness !== 0) {
                    processor.apply_brightness(brightness);
                }
                if (contrast !== 100) {
                    processor.apply_contrast(contrast);
                }
                if (saturation !== 100) {
                    processor.apply_saturation(saturation);
                }
                if (hue !== 0) {
                    processor.apply_hue(hue);
                }

                updateCanvas();
            } catch (error) {
                console.error('Adjustments error:', error);
            }
        };

        // 旋转图片
        window.rotateImage = function() {
            if (!processor) return;
            showLoading(true);
            try {
                // 旋转 90 度需要特殊处理
                alert('旋转功能需要额外的 WebAssembly 支持');
            } catch (error) {
                console.error('Rotate error:', error);
            }
            showLoading(false);
        };

        // 翻转图片
        window.flipImage = function() {
            if (!processor) return;
            showLoading(true);
            try {
                alert('翻转功能需要额外的 WebAssembly 支持');
            } catch (error) {
                console.error('Flip error:', error);
            }
            showLoading(false);
        };

        // 缩放图片
        window.resizeImage = function() {
            if (!processor) return;
            const scale = prompt('请输入缩放比例 (0.1 - 2.0):', '0.5');
            if (scale && !isNaN(scale)) {
                showLoading(true);
                try {
                    alert('缩放功能需要额外的 WebAssembly 支持');
                } catch (error) {
                    console.error('Resize error:', error);
                }
                showLoading(false);
            }
        };

        // 格式转换
        window.convertFormat = function(format) {
            if (!processor) return;
            showLoading(true);
            try {
                const base64 = format === 'png' ? processor.to_png() : processor.to_jpeg(90);
                const link = document.createElement('a');
                link.download = `image.${format}`;
                link.href = `data:image/${format};base64,${base64}`;
                link.click();
            } catch (error) {
                console.error('Convert error:', error);
            }
            showLoading(false);
        };

        // 重置图片
        window.resetImage = function() {
            if (!processor) return;

            // 重置 WebAssembly 处理器
            processor.reset();

            // 重置滑块
            document.getElementById('brightnessSlider').value = 0;
            document.getElementById('contrastSlider').value = 100;
            document.getElementById('saturationSlider').value = 100;
            document.getElementById('hueSlider').value = 0;

            // 重置显示值
            document.getElementById('brightnessValue').textContent = '0';
            document.getElementById('contrastValue').textContent = '100';
            document.getElementById('saturationValue').textContent = '100';
            document.getElementById('hueValue').textContent = '0';

            // 更新画布
            updateCanvas();
        };

        // 下载图片
        window.downloadImage = function() {
            const canvas = document.getElementById('imageCanvas');
            const link = document.createElement('a');
            link.download = 'edited_image.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };

        // 更新画布
        function updateCanvas() {
            if (!processor) return;
            const width = processor.get_width();
            const height = processor.get_height();

            // 使用 get_base64() 获取图像数据并绘制到 Canvas
            const base64 = processor.to_base64();

            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');

            // 创建图像对象
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0);
            };
            img.src = `data:image/png;base64,${base64}`;
        }

        // 初始化
        initWasm();
    </script>
</body>
</html>
